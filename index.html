<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회계학 O/X 말문제 마스터</title>
<style>
:root {
--primary: #1a56db;
--primary-dark: #1e429f;
--correct: #057a55;
--wrong: #c81e1e;
--warn: #b45309;
--bg: #f8fafc;
--card: #ffffff;
--border: #e2e8f0;
--text: #1e293b;
--sub: #64748b;
--badge-wrong: #fef2f2;
--badge-wrong-border: #fca5a5;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── 헤더 ── */
header {
background: linear-gradient(135deg, #1e3a8a 0%, #1a56db 100%);
color: #fff; padding: 20px 24px 16px; text-align: center;
}
header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.3px; }
header p { font-size: 0.78rem; opacity: .8; margin-top: 4px; }

/* ── 통계바 ── */
.stats {
display: flex; gap: 0; background: #fff; border-bottom: 1px solid var(--border);
justify-content: center;
}
.stat-item {
flex: 1; max-width: 160px; text-align: center;
padding: 12px 8px; border-right: 1px solid var(--border);
}
.stat-item:last-child { border-right: none; }
.stat-num { font-size: 1.4rem; font-weight: 700; color: var(--primary); }
.stat-num.red { color: var(--wrong); }
.stat-label { font-size: 0.7rem; color: var(--sub); margin-top: 2px; }

/* ── 탭 ── */
.tab-bar {
display: flex; background: #fff; border-bottom: 2px solid var(--border);
padding: 0 16px; gap: 4px;
}
.tab-btn {
padding: 12px 18px; font-size: 0.88rem; font-weight: 600;
border: none; background: none; cursor: pointer; color: var(--sub);
border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .15s;
}
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-btn .badge {
display: inline-block; background: var(--wrong); color: #fff;
font-size: 0.68rem; border-radius: 99px; padding: 1px 6px; margin-left: 5px;
font-weight: 700;
}
.tab-btn .badge.hidden { display: none; }

/* ── 단원 선택 그리드 ── */
#view-home { padding: 20px 16px; }
.unit-grid {
display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 8px;
}
.unit-btn {
background: var(--card); border: 1.5px solid var(--border); border-radius: 10px;
padding: 14px 8px; text-align: center; cursor: pointer; font-size: 0.82rem;
font-weight: 600; color: var(--text); transition: all .15s; position: relative;
}
.unit-btn:hover { border-color: var(--primary); color: var(--primary); }
.unit-btn .unit-count { display: block; font-size: 0.68rem; color: var(--sub); margin-top: 4px; font-weight: 400; }
.unit-btn .unit-wrong {
position: absolute; top: -6px; right: -6px; background: var(--wrong);
color: #fff; font-size: 0.62rem; font-weight: 700; border-radius: 99px;
padding: 2px 6px; display: none;
}
.unit-btn .unit-wrong.show { display: block; }

/* ── 문제 뷰 ── */
#view-quiz, #view-wrong { padding: 16px; max-width: 700px; margin: 0 auto; }

.quiz-header {
display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}
.back-btn {
background: none; border: 1.5px solid var(--border); border-radius: 8px;
padding: 6px 12px; cursor: pointer; font-size: 0.82rem; color: var(--sub);
font-weight: 600;
}
.back-btn:hover { border-color: var(--primary); color: var(--primary); }
.quiz-title { font-size: 1rem; font-weight: 700; color: var(--text); }
.quiz-progress { font-size: 0.78rem; color: var(--sub); margin-left: auto; }

.progress-bar-wrap { height: 6px; background: var(--border); border-radius: 99px; margin-bottom: 20px; }
.progress-bar-fill { height: 100%; background: var(--primary); border-radius: 99px; transition: width .3s; }

.question-card {
background: var(--card); border: 1.5px solid var(--border); border-radius: 14px;
padding: 24px 22px; margin-bottom: 16px; position: relative;
}
.question-card .q-num {
font-size: 0.72rem; font-weight: 700; color: var(--primary);
text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px;
}
.question-card .q-text {
font-size: 0.95rem; line-height: 1.7; color: var(--text);
}
.question-card .q-unit-tag {
display: inline-block; background: #eff6ff; color: var(--primary);
font-size: 0.68rem; font-weight: 600; border-radius: 6px; padding: 2px 8px;
margin-bottom: 10px;
}

.ox-buttons { display: flex; gap: 12px; margin-bottom: 6px; }
.ox-btn {
flex: 1; padding: 16px; font-size: 1.6rem; font-weight: 700;
border: 2px solid var(--border); border-radius: 12px; background: var(--card);
cursor: pointer; transition: all .15s; text-align: center;
}
.ox-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
.ox-btn.O:hover { border-color: var(--correct); color: var(--correct); }
.ox-btn.X:hover { border-color: var(--wrong); color: var(--wrong); }
.ox-btn.selected-correct { background: #f0fdf4; border-color: var(--correct); color: var(--correct); }
.ox-btn.selected-wrong { background: #fef2f2; border-color: var(--wrong); color: var(--wrong); }

.feedback-box {
border-radius: 10px; padding: 14px 16px; font-size: 0.88rem; line-height: 1.6;
margin-bottom: 14px; display: none;
}
.feedback-box.correct { background: #f0fdf4; border: 1.5px solid #86efac; color: #166534; }
.feedback-box.wrong { background: #fef2f2; border: 1.5px solid #fca5a5; color: #991b1b; }

.next-btn {
width: 100%; padding: 14px; background: var(--primary); color: #fff;
border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700;
cursor: pointer; display: none; transition: background .15s;
}
.next-btn:hover { background: var(--primary-dark); }

/* ── 오답 뷰 헤더 ── */
.wrong-header-info {
background: var(--badge-wrong); border: 1.5px solid var(--badge-wrong-border);
border-radius: 10px; padding: 14px 16px; margin-bottom: 16px;
font-size: 0.88rem; color: var(--wrong); font-weight: 600;
}
.wrong-mode-label {
font-size: 0.75rem; font-weight: 700; letter-spacing: .5px;
color: var(--wrong); text-transform: uppercase; margin-bottom: 4px;
}

/* ── 완료 화면 ── */
.done-card {
background: var(--card); border: 1.5px solid var(--border); border-radius: 14px;
padding: 36px 24px; text-align: center;
}
.done-card .done-icon { font-size: 3rem; margin-bottom: 12px; }
.done-card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
.done-card p { font-size: 0.88rem; color: var(--sub); margin-bottom: 20px; line-height: 1.6; }
.done-card .done-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.done-card .done-btn {
padding: 10px 22px; border-radius: 10px; font-size: 0.88rem; font-weight: 700;
cursor: pointer; border: 2px solid var(--primary); transition: all .15s;
}
.done-btn.primary { background: var(--primary); color: #fff; }
.done-btn.secondary { background: #fff; color: var(--primary); }
.done-btn:hover { opacity: .85; }

/* ── 초기화 버튼 ── */
.reset-wrap { text-align: center; padding: 20px 0 30px; }
.reset-btn {
background: none; border: 1.5px solid #fca5a5; color: var(--wrong);
border-radius: 8px; padding: 8px 20px; font-size: 0.8rem; cursor: pointer;
font-weight: 600; transition: all .15s;
}
.reset-btn:hover { background: #fef2f2; }

@media (max-width: 480px) {
.unit-grid { grid-template-columns: repeat(2, 1fr); }
.stat-item { max-width: none; }
}
</style>
</head>
<body>

<header>
<h1>📚 회계학 O/X 말문제 마스터</h1>
<p>K-IFRS 핵심 20대 단원 · 오답 완전학습 시스템</p>
</header>

<!-- 통계 -->
<div class="stats">
<div class="stat-item">
<div class="stat-num" id="stat-total">0</div>
<div class="stat-label">총 풀이</div>
</div>
<div class="stat-item">
<div class="stat-num" id="stat-correct">0</div>
<div class="stat-label">정답</div>
</div>
<div class="stat-item">
<div class="stat-num red" id="stat-wrong-cnt">0</div>
<div class="stat-label">오답 문제 수</div>
</div>
<div class="stat-item">
<div class="stat-num" id="stat-rate">0%</div>
<div class="stat-label">정답률</div>
</div>
</div>

<!-- 탭 -->
<div class="tab-bar">
<button class="tab-btn active" onclick="switchTab('home')">단원 선택</button>
<button class="tab-btn" id="tab-wrong-btn" onclick="switchTab('wrong')">
❌ 오답 반복 <span class="badge hidden" id="wrong-badge">0</span>
</button>
</div>

<!-- 홈 뷰 -->
<div id="view-home">
<div class="unit-grid" id="unit-grid"></div>
<div class="reset-wrap">
<button class="reset-btn" onclick="confirmReset()">🗑 학습 기록 전면 초기화</button>
</div>
</div>

<!-- 퀴즈 뷰 -->
<div id="view-quiz" style="display:none"></div>

<!-- 오답 반복 뷰 -->
<div id="view-wrong" style="display:none"></div>

<script>
/* ══════════════════════════════════════════
문제 데이터베이스
answer: 'O' | 'X'
explanation: 해설
══════════════════════════════════════════ */
const QUESTIONS = [
  /* ── 유형자산 ── */
  { id: 1, unit: '유형자산', text: '안전 또는 환경상의 이유로 취득하는 유형자산은 당해 유형자산을 취득하지 않았을 경우보다 관련 자산으로부터 미래경제적효익을 더 많이 얻을 수 있게 해주기 때문에 자산으로 인식할 수 있다.', answer: 'O', explanation: '안전·환경상 유형자산은 다른 자산의 미래경제적효익을 얻기 위해 필수적이므로 자산으로 인식합니다.' },
  { id: 2, unit: '유형자산', text: '유형자산을 운용할 직원의 교육훈련비는 유형자산의 취득원가로 인식하지 않고 발생시점에 비용으로 인식한다.', answer: 'O', explanation: '직원의 교육훈련비는 자산을 의도한 상태로 이르게 하는 데 직접 관련이 없는 원가이므로 발생 시 즉시 비용 처리합니다.' },
  { id: 3, unit: '유형자산', text: '유형자산의 시험과정에서 생산된 재화의 순매각금액은 당해 유형자산의 취득원가에서 차감한다.', answer: 'X', explanation: '최신 K-IFRS 기준 개정에 따라 시험가동 중 생산된 시제품의 순매각금액과 원가는 취득원가에서 차감하지 않고 각각 당기손익(수익과 비용)으로 인식합니다.' },
  { id: 4, unit: '유형자산', text: '대금지급기간이 일반적인 신용기간을 초과하여 이연되는 경우, 유형자산의 원가는 인식시점의 현금가격상당액이다.', answer: 'O', explanation: '이연지급조건 거래의 경우 현금가격상당액(현재가치)을 원가로 하고, 총지급액과의 차액은 신용기간에 걸쳐 이자비용으로 인식합니다.' },
  { id: 5, unit: '유형자산', text: '유형자산의 전체원가에 비교하여 해당 원가가 유의적이지 않은 부분도 별도로 분리하여 감가상각할 수 있다.', answer: 'O', explanation: '원가가 유의적이지 않은 부분도 기업의 선택에 따라 별도로 분리하여 감가상각할 수 있습니다.' },
  { id: 6, unit: '유형자산', text: '유형자산의 감가상각은 자산이 사용가능한 때부터 시작한다.', answer: 'O', explanation: '감가상각은 자산의 취득 시점이 아니라, 경영진이 의도하는 방식으로 가동할 수 있는 위치와 상태에 이른 \'사용가능한 때\'부터 시작합니다.' },
  { id: 7, unit: '유형자산', text: '유형자산이 운휴 중이거나 적극적인 사용상태가 아니어도, 감가상각이 완전히 이루어지기 전까지는 감가상각을 중단하지 않는다.', answer: 'O', explanation: '사용하지 않는 운휴 자산이라도 감가상각을 계속 진행합니다. 단, 매각예정자산 분류 시에는 중단됩니다.' },
  { id: 8, unit: '유형자산', text: '감가상각방법의 변경은 회계추정의 변경으로 보아 회계처리한다.', answer: 'O', explanation: '감가상각방법, 내용연수, 잔존가치의 변경은 모두 \'회계추정의 변경\'에 해당하므로 전진적으로 처리합니다.' },
  { id: 9, unit: '유형자산', text: '토지와 건물 일괄 취득 후 건물을 철거한다면 구입가격은 전액 토지의 취득원가가 되며 건물 철거비용은 토지의 취득원가에 가산하고, 철거에 따른 폐자재의 처분수익 등은 토지의 취득원가에서 차감한다.', answer: 'O', explanation: '토지만을 사용하기 위한 목적이므로 일괄 취득 후 기존 건물 철거 시 발생하는 순철거비용은 전액 토지의 원가에 산입합니다.' },
  { id: 10, unit: '유형자산', text: '이미 발생한 비용이나 손실에 대한 보전 또는 향후의 관련원가 없이 기업에 제공되는 즉각적인 금융지원으로 수취하는 정부보조금은 정부보조금을 수취할 권리가 발생하는 기간에 당기손익으로 인식한다.', answer: 'O', explanation: '향후 관련 원가가 없는 즉각적인 지원 성격의 정부보조금은 수취할 권리가 발생하는 기간에 즉시 당기손익으로 처리합니다.' },
  { id: 11, unit: '유형자산', text: '자산관련 정부보조금은 재무상태표에 이연수익으로 표시하거나 자산의 장부금액을 결정할 때 차감하여 표시할 수 있다.', answer: 'O', explanation: 'K-IFRS에서는 부채로 인식하는 이연수익법과 자산에서 직접 빼는 자산차감법 두 가지 표시방법을 모두 허용합니다.' },
  { id: 12, unit: '유형자산', text: '상환의무가 발생하게 된 정부보조금은 회계정책의 변경으로 회계처리한다.', answer: 'X', explanation: '정부보조금의 상환은 회계정책의 변경이 아니라 \'회계추정의 변경\'으로 보아 전진 적용합니다.' },
  { id: 13, unit: '유형자산', text: '자산의 회수가능액은 당해 자산의 순공정가치와 사용가치 중 큰 금액으로 한다.', answer: 'O', explanation: '손상검사 시 회수가능액은 순공정가치(매각 가치)와 사용가치(계속 사용 가치) 중 큰 금액(MAX)으로 정의됩니다.' },
  { id: 14, unit: '유형자산', text: '손상, 소실 또는 포기된 유형자산에 대해 제3자로부터 보상금을 받는 경우, 이 보상금은 실제로 수취한 시점에 당기손익으로 반영한다.', answer: 'X', explanation: '보상금은 현금을 실제로 수취한 시점이 아니라, 보상금을 수취할 권리가 발생하는 시점에 당기손익으로 반영합니다.' },
  { id: 15, unit: '유형자산', text: '회수가능액을 측정할 때 항상 처분부대원가를 뺀 공정가치와 사용가치 모두를 산정할 필요는 없다. 두 금액 중 하나가 자산의 장부금액을 초과한다면 자산이 손상되지 않았으므로 다른 금액을 추정할 필요가 없다.', answer: 'O', explanation: '둘 중 하나라도 장부금액보다 크다면 손상이 발생하지 않은 것이 확실하므로 나머지 가치를 추가로 계산할 필요가 없습니다.' },
  { id: 16, unit: '유형자산', text: '재평가는 보고기간 말에 자산의 장부금액이 공정가치와 중요하게 차이가 나지 않도록 주기적으로 수행한다.', answer: 'O', explanation: '매년 의무적으로 해야 하는 것은 아니며, 공정가치의 변동성에 따라 중요하게 차이가 나지 않는 주기로 주기적으로 수행하면 됩니다.' },
  { id: 17, unit: '유형자산', text: '재평가잉여금은 이익잉여금으로 대체할 수 있다.', answer: 'O', explanation: '재평가잉여금은 당기손익으로 재분류할 수는 없지만, 자산이 폐기되거나 처분될 때 이익잉여금으로 직접 대체할 수 있습니다.' },

  /* ── 재고자산 ── */
  { id: 18, unit: '재고자산', text: '매입할인, 리베이트 및 기타 유사한 항목은 매입원가를 결정할 때 차감한다.', answer: 'O', explanation: '매입 과정에서 발생한 할인이나 리베이트는 매입원가에서 직접 차감하여 반영합니다.' },
  { id: 19, unit: '재고자산', text: '고정제조간접원가는 생산설비의 정상조업도에 기초하여 전환원가에 배부하는데, 실제조업도가 정상조업도와 유사한 경우에는 실제조업도를 사용할 수 있다.', answer: 'O', explanation: '실제조업도가 정상조업도와 큰 차이가 없다면 실제조업도를 배부 기준으로 적용할 수 있습니다.' },
  { id: 20, unit: '재고자산', text: '재고자산을 후불조건으로 취득하는 경우, 계약이 실질적으로 금융요소를 포함하고 있다면 지급할 금액의 현재가치를 재고자산의 취득원가로 인식한다.', answer: 'O', explanation: '후불조건에 금융요소가 있다면 자산의 원가는 현재가치로 인식하고, 명목금액과의 차액은 이자비용으로 처리합니다.' },
  { id: 21, unit: '재고자산', text: '표준원가법이나 소매재고법 등의 원가측정방법은 그러한 방법으로 평가한 결과가 실제 원가와 유사한 경우에 편의상 사용할 수 있다. 매출총이익률법은 재무보고 목적으로 사용할 수 없다.', answer: 'O', explanation: '표준원가와 소매재고법은 실제원가와 유사하면 인정되나, 매출총이익률법은 단순 추정법이므로 외부 재무보고용으로 허용되지 않습니다.' },
  { id: 22, unit: '재고자산', text: '일반상품중개기업의 재고자산은 순공정가치로 측정한다.', answer: 'O', explanation: '중개기업이 매매 목적으로 보유하는 재고자산은 저가법이 아닌 순공정가치로 측정하며, 변동분은 당기손익에 반영합니다.' },
  { id: 23, unit: '재고자산', text: '개별법이 적용되지 않는 재고자산의 단위원가는 선입선출법이나 가중평균법을 사용하여 결정한다.', answer: 'O', explanation: 'K-IFRS는 후입선출법(LIFO)을 인정하지 않으므로 선입선출법이나 평균법 중 선택해야 합니다.' },
  { id: 24, unit: '재고자산', text: '인플레이션을 가정할 경우 선입선출법을 적용하는 경우 당기순이익이 가장 크다.', answer: 'O', explanation: '물가 상승 시 선입선출법은 과거의 저렴한 단가가 매출원가로 대응되므로 매출원가가 가장 작아지고 당기순이익과 기말재고액은 가장 커집니다.' },
  { id: 25, unit: '재고자산', text: '한국채택국제회계기준은 후입선출법의 사용을 허용하지 않는다.', answer: 'O', explanation: '후입선출법은 실제 물량 흐름과 반대이고 이익 조작 왜곡 가능성이 커 K-IFRS에서는 사용이 전면 금지되어 있습니다.' },
  { id: 26, unit: '재고자산', text: '성격이나 용도 면에서 차이가 있는 재고자산에는 서로 다른 단위원가 결정방법을 적용할 수 있다.', answer: 'O', explanation: '재고자산의 단가산정 방식 차별화는 오직 자산의 \'성격이나 용도\'의 차이에 의해서만 정당화될 수 있습니다.' },
  { id: 27, unit: '재고자산', text: '재고자산의 지역별 위치나 과세방식이 다르다는 이유만으로 동일한 재고자산에 다른 단위원가 결정방법을 적용하는 것은 정당화될 수 없다.', answer: 'O', explanation: '단순히 물리적 위치나 세금 계산 구조가 다르다는 사유로는 동일 성격의 재고에 다른 단가공식을 적용할 수 없습니다.' },
  { id: 28, unit: '재고자산', text: '재고자산은 취득원가와 순실현가능가치 중 낮은 금액으로 측정한다.', answer: 'O', explanation: '기말 재고의 자산 과대평가를 방지하기 위해 보수주의 원칙에 따른 저가법을 적용합니다.' },
  { id: 29, unit: '재고자산', text: '재고자산의 분류나 특정 영업부문에 속하는 모든 재고자산에 기초하여 저가법을 적용하는 것도 허용한다.', answer: 'X', explanation: '저가법은 항목별 적용이 원칙이며, 유사 항목 조별 적용은 가능하나 부문 전체를 통틀어 상쇄시키는 총액기준 적용은 불가능합니다.' },
  { id: 30, unit: '재고자산', text: '확정판매계약 또는 용역계약을 이행하기 위하여 보유하는 재고자산의 순실현가능가치는 계약가격에 기초한다. 만일 보유하고 있는 재고자산의 수량이 확정판매계약의 이행에 필요한 수량을 초과하는 경우에는 그 초과 수량의 순실현가능가치는 일반 판매가격에 기초한다.', answer: 'O', explanation: '계약이 체결된 수량은 약정된 계약단가로 가치를 평가하고, 이를 초과하는 잔여 수량에 대해서만 일반 시장 시가를 기준으로 삼습니다.' },
  { id: 31, unit: '재고자산', text: '완성될 제품이 원가 이상으로 판매될 것으로 예상하는 경우에는 그 생산에 투입하기 위해 보유하는 원재료 및 기타 소모품을 감액하지 아니한다.', answer: 'O', explanation: '최종 제품의 매각 가격이 원가를 방어할 수 있다면 이익 보전이 되므로 투입 원재료의 시가가 하락했더라도 자산을 감액하지 않습니다.' },
  { id: 32, unit: '재고자산', text: '재고자산의 감액을 초래했던 상황이 해소되거나 경제상황의 변동으로 순실현가능가치가 상승한 명백한 증거가 있는 경우에는 최초의 장부금액을 초과하지 않는 범위 내에서 평가손실을 환입한다.', answer: 'O', explanation: '가치 회복 시 이전에 인식했던 평가손실 누적액을 한도로(즉 최초 취득원가 이내) 환입 처리를 진행합니다.' },
  { id: 33, unit: '재고자산', text: '생물자산과 수확물은 순공정가치로 최초인식한다.', answer: 'O', explanation: '농림어업 생물자산과 수확물은 최초 인식 시점부터 공정가치에서 처분부대비용을 뺀 \'순공정가치\'를 원가로 취급합니다.' },
  { id: 34, unit: '재고자산', text: '생물자산을 최초 인식시점에 순공정가치로 인식하여 발생하는 평가손익과 생물자산의 순공정가치 변동으로 발생하는 평가손익은 발생한 기간의 당기손익에 반영한다.', answer: 'O', explanation: '미실현손익이지만 생물자산 특성상 가치 변동성이 크고 직접 귀속되므로 자본(OCI)이 아닌 전액 당기손익으로 즉시 반영합니다.' },
  { id: 35, unit: '재고자산', text: '생물자산에서 수확된 수확물은 수확시점에 순공정가치로 측정하여야 한다.', answer: 'O', explanation: '수확 시점까지는 생물자산 기준을 준용하므로 순공정가치로 측정하는 것이 올바릅니다.' },
  { id: 36, unit: '재고자산', text: '수확물은 수확시점 후에는 기업회계기준서 제1002호 \'재고자산\'이나 다른 적용 가능한 한국채택국제회계기준서를 적용한다.', answer: 'O', explanation: '수확 완료 후 창고 입고 시점부터는 일반 재고자산 기준서(저가법 등)를 적용합니다.' },
  { id: 37, unit: '재고자산', text: '순공정가치로 측정하는 생물자산과 관련된 정부보조금에 다른 조건이 없는 경우에는 이를 수취할 수 있게 되는 시점에만 당기손익으로 인식한다.', answer: 'O', explanation: '조건이 없는 정부보조금은 수취 권리가 확정되는 시점에 즉시 당기손익 항목으로 편입합니다.' },

  /* ── 투자부동산 ── */
  { id: 38, unit: '투자부동산', text: '장래 사용목적을 결정하지 못한 채 보유하고 있는 토지는 투자부동산으로 분류한다.', answer: 'O', explanation: '용도가 미정인 토지는 시세차익 목적으로 보유하는 것으로 간주하여 투자부동산으로 분류합니다.' },
  { id: 39, unit: '투자부동산', text: '부동산 중 일부는 시세차익을 얻기 위해 보유하고, 일부는 재화의 생산에 사용하기 위하여 보유하고 있으나 이를 부분별로 분리하여 매각할 수 없다면 전체를 투자부동산으로 분류한다.', answer: 'X', explanation: '자가사용 부분이 매우 경미한 경우에만 전체를 투자부동산으로 분류하고, 그렇지 않으면 유형자산으로 분류합니다.' },
  { id: 40, unit: '투자부동산', text: '종업원이 사용하는 부동산은 종업원이 시장가격으로 임차료를 지급하고 있다면 투자부동산으로 분류한다.', answer: 'X', explanation: '종업원 사용 부동산은 임대료 수준과 무관하게 기업 관점의 자가사용 부동산이므로 무조건 \'유형자산\'입니다.' },
  { id: 41, unit: '투자부동산', text: '부동산 소유자가 사용자에게 제공하는 부수적인 용역의 비중이 전체 계약에서 경미하다면 당해 부동산을 투자부동산으로 분류한다.', answer: 'O', explanation: '부수 서비스 비중이 미미하다면 본질이 부동산 임대이므로 투자부동산에 해당합니다.' },
  { id: 42, unit: '투자부동산', text: '투자부동산은 최초인식시점에 원가로 측정한다.', answer: 'O', explanation: '투자부동산은 최초 인식 시점에 거래원가를 포함한 원가로 측정하는 것이 기본 원칙입니다.' },
  { id: 43, unit: '투자부동산', text: '투자부동산의 손상, 멸실 또는 포기로 제3자에게서 받는 보상은 받을 수 있게 되는 시점에 당기손익으로 인식한다.', answer: 'O', explanation: '제3자로부터의 보상금은 수취할 권리가 확정되어 받을 수 있게 되는 시점에 당기손익으로 반영합니다.' },
  { id: 44, unit: '투자부동산', text: '지배기업이 종속기업에게 리스하는 부동산은 지배기업 개별재무제표뿐만 아니라 연결재무제표에서도 투자부동산으로 분류할 수 없다.', answer: 'O', explanation: '개별에서는 투자부동산이지만, 연결그룹 전체 관점에서는 자가사용 부동산이 되므로 연결재무제표에서는 투자부동산으로 분류할 수 없습니다.' },
  { id: 45, unit: '투자부동산', text: '투자부동산에 대한 평가방법으로 공정가치모형을 선택한 경우에는 모든 투자부동산에 대하여 감가상각을 수행하지 않고 공정가치로 평가하여 측정하고, 공정가치의 변동분은 전액 당기손익에 반영한다.', answer: 'O', explanation: '투자부동산 공정가치모형의 핵심은 감가상각 생략 및 공정가치 변동액의 \'당기손익\' 인식입니다.' },
  { id: 46, unit: '투자부동산', text: '자가사용부동산을 공정가치로 평가하는 투자부동산으로 대체하는 경우, 사용목적 변경시점의 장부금액과 공정가치의 차액은 재평가회계처리와 동일한 방법으로 회계처리한다.', answer: 'O', explanation: '유형자산을 투자부동산 공정가치모형으로 대체할 때 발생하는 장부금액 초과 상승분은 OCI(기타포괄손익)로 보냅니다.' },
  { id: 47, unit: '투자부동산', text: '재고자산을 공정가치로 평가하는 투자부동산으로 대체하는 경우, 재고자산의 장부금액과 대체시점의 공정가치의 차액은 당기손익으로 인식한다.', answer: 'O', explanation: '재고자산에서 투자부동산 공정가치모형으로 계정 대체 시 발생하는 가치 변동액은 전액 당기손익으로 처리합니다.' },
  { id: 48, unit: '투자부동산', text: '공정가치로 평가하게 될 자가건설 투자부동산의 건설이나 개발이 완료되면 해당일의 공정가치와 기존 장부금액의 차액은 당기손익으로 인식한다.', answer: 'O', explanation: '자가건설 투자부동산의 개발 완료 시점에 장부금액과 공정가치의 차액은 \'당기손익\'으로 인식하는 것이 올바릅니다.' },
  { id: 49, unit: '투자부동산', text: '투자부동산의 대체는 실제 사용 목적의 변경이라는 명백한 증거가 있을 때만 허용된다.', answer: 'O', explanation: '경영진의 의도 변경만으로는 불충분하며 실제 사용목적이 변경되었다는 객관적 증거를 요합니다.' },

  /* ── 무형자산 ── */
  { id: 50, unit: '무형자산', text: '계약상 권리 또는 기타 법적 권리는 그러한 권리가 이전가능한지 여부 또는 기업이나 기타 권리와 의무에서 분리가능한지 여부와 관계없이 식별가능하다.', answer: 'O', explanation: '계약상·법적 권리에서 발생했다면 분리가능성 요건 충족 여부와 관계없이 식별가능합니다.' },
  { id: 51, unit: '무형자산', text: '무형자산의 미래경제적효익에 대한 통제능력을 제시할 때 법적 집행가능성이 통제의 필수조건은 아니다.', answer: 'O', explanation: '법적 권리가 없더라도 비밀유지약정 등 타 수단으로 통제할 수 있으므로 필수적인 필요조건은 아닙니다.' },
  { id: 52, unit: '무형자산', text: '개별 취득하는 무형자산은 발생가능성 인식기준을 항상 충족하는 것으로 본다.', answer: 'O', explanation: '외부에서 대가를 주고 취득한 무형자산은 원가를 지불했다는 사실 자체가 효익 유입가능성이 높음을 대변하므로 항상 충족된 것으로 간주합니다.' },
  { id: 53, unit: '무형자산', text: '무형자산을 최초로 취득할 경우에는 원가로 측정한다.', answer: 'O', explanation: '무형자산 역시 최초 인식 시점에는 취득을 위해 투입한 비용인 \'원가\'로 측정하는 것이 원칙입니다.' },
  { id: 54, unit: '무형자산', text: '무형자산을 사용하거나 재배치하는 데 발생하는 원가는 자산의 장부금액에 포함하지 않는다.', answer: 'O', explanation: '자산이 이미 의도한 상태로 작동 가능한 상태가 된 이후에 자산을 재배치하거나 추가 사용하는 원가는 자산원가에 넣지 않고 당기 비용 처리합니다.' },
  { id: 55, unit: '무형자산', text: '내부적으로 창출한 영업권, 브랜드, 제호, 출판표제, 고객 목록과 이와 실질이 유사한 항목은 무형자산으로 인식하지 아니한다.', answer: 'O', explanation: '내부창출 브랜드나 영업권 등은 원가를 신뢰성 있게 구분해 측정할 수 없으므로 절대로 자산으로 인식할 수 없습니다.' },
  { id: 56, unit: '무형자산', text: '무형자산이 한정할 수 없는 기간 동안 순현금유입을 창출할 것으로 기대된다면 그 무형자산은 비한정 내용연수를 가지며, 상각하지 않는다.', answer: 'O', explanation: '비한정 내용연수 무형자산은 자산의 수명이 다하는 시점을 한정할 수 없기 때문에 감가상각을 하지 않는 대신 매년 의무적으로 손상검사를 수행합니다.' },
  { id: 57, unit: '무형자산', text: '내용연수가 비한정인 무형자산은 매년 또는 무형자산의 손상을 시사하는 징후가 있을 경우에 손상검사를 수행하여야 한다.', answer: 'O', explanation: '상각을 수행하지 않는 비한정 자산은 매년, 그리고 손상 징후가 있을 때 손상검사를 진행해야 합니다.' },
  { id: 58, unit: '무형자산', text: '무형자산의 상각은 자산을 사용할 수 있는 때부터 시작한다.', answer: 'O', explanation: '무형자산의 상각 역시 취득 시점이 아니라 자산을 의도한 용도로 \'사용할 수 있는 때\'부터 개시합니다.' },
  { id: 59, unit: '무형자산', text: '무형자산의 상각방법은 자산의 경제적 효익이 소비될 것으로 예상되는 형태를 반영한 방법이어야 한다. 만약 경제적 효익이 소비되는 형태를 신뢰성 있게 결정할 수 없는 경우에는 정액법을 사용한다.', answer: 'O', explanation: '경제적 효익 소비 행태 반영이 원칙이며, 이를 합리적으로 결정할 수 없을 때 최후의 수단으로 \'정액법\'을 적용합니다.' },
  { id: 60, unit: '무형자산', text: '내용연수가 유한한 무형자산의 잔존가치는 예외적인 경우(제3자 매입 약정이나 활성시장 존재)를 제외하고는 영(0)으로 본다.', answer: 'O', explanation: '원칙은 영(0)이지만 약정이나 활성시장이 존재하는 특수 예외에는 잔존가치를 인정합니다.' },
  { id: 61, unit: '무형자산', text: '내용연수가 유한한 무형자산의 상각기간과 상각방법은 적어도 매 보고기간 말에 재검토한다. 상각기간이나 상각방법의 변경은 회계추정의 변경으로 보아 전진법을 적용하여 회계처리한다.', answer: 'O', explanation: '상각 방법 및 기간의 변경은 미래 소비 추정치의 수정이므로 \'회계추정의 변경\'에 해당하여 전진 적용합니다.' },
  { id: 62, unit: '무형자산', text: '연구(또는 내부 프로젝트의 연구단계)에서 발생하는 무형자산은 인식하지 않는다.', answer: 'O', explanation: '연구단계는 미래 경제적 효익의 발생을 증명할 수 없으므로 무형자산으로 인식하지 않고 전액 당기 비용 처리합니다.' },
  { id: 63, unit: '무형자산', text: '무형자산을 창출하기 위한 내부 프로젝트를 연구단계와 개발단계로 구분할 수 없는 경우에는 그 프로젝트에서 발생한 지출은 모두 연구단계에서 발생한 것으로 본다.', answer: 'O', explanation: '단계를 명확히 분리할 수 없다면 자산 인정 가능성이 낮은 \'연구단계\'에서 발생한 지출로 간주해 비용 처리합니다.' },
  { id: 64, unit: '무형자산', text: '박토활동자산은 기존 자산에 부가되거나 기존 자산을 보강한 것으로 회계처리한다. 다른 방법이 더 적절하지 않다면 생산량비례법을 적용한다.', answer: 'O', explanation: '광산 노천 박토활동은 채굴 접근성을 개선하는 활동이므로 기존 자산 가치에 가산하며, 소모 형태에 맞춰 생산량비례법을 적용합니다.' },
  { id: 65, unit: '무형자산', text: '박토활동자산은 최초에 원가로 측정한다.', answer: 'O', explanation: '박토활동자산 역시 최초 인식 시점에는 실제 유발된 직접 원가로 기재합니다.' },
  { id: 66, unit: '무형자산', text: '박토활동자산은 다른 방법이 더 적절하지 않다면 생산량비례법을 적용하여 상각한다.', answer: 'O', explanation: '정액법이 아니라 접근 가능한 광석 매장량 소모와 연동되는 생산량비례법이 강제 우선됩니다.' },
  { id: 67, unit: '무형자산', text: '광물자원 추출에 대한 기술적 실현가능성과 상업화가능성을 제시할 수 있는 시점에는 더 이상 탐사평가자산으로 분류하지 아니한다.', answer: 'O', explanation: '기술적·상업적 타당성이 증명된 시점 이후부터는 정식 개발비 단계로 넘어가므로 더 이상 탐사평가자산 명목으로 인식할 수 없습니다.' },
  { id: 68, unit: '무형자산', text: '웹사이트가 수익을 창출할 수 있을 때 웹사이트가 어떻게 미래경제적효익을 창출할지 제시할 수 있다.', answer: 'O', explanation: '주문 및 결제 기능 등을 갖추어 구체적인 가치 창출을 입증해 낼 수 있는 구조가 잡혀야 자산성이 열립니다.' },
  { id: 69, unit: '무형자산', text: '내부용 웹사이트의 개발 지출 중 자체 개발 단독 요건이 충족되지 못한 조사 및 계획 단계 지출은 즉시 비용 처리한다.', answer: 'O', explanation: '무형자산 요건 충족 유무를 확실하게 제시하기 전 단계의 지출은 모두 비용으로 처리됩니다.' },

  /* ── 차입원가 ── */
  { id: 70, unit: '차입원가', text: '적격자산을 의도된 용도로 사용하거나 판매가능한 상태에 이르기 하는 데 필요한 활동은 당해 자산의 물리적인 제작뿐만 아니라 그 이전단계에서 이루어진 기술 및 관리상의 활동도 포함한다.', answer: 'O', explanation: '물리적 공사뿐만 아니라 그 이전 단계의 설계, 기술 검토, 인허가 관리 등 행정·기술 활동도 모두 자본화 기간 활동에 포함됩니다.' },
  { id: 71, unit: '차입원가', text: '적격자산의 건설활동을 여러 부분으로 나누어 완성하고, 남아있는 부분의 건설활동을 계속 진행하고 있더라도 이미 완성된 부분이 사용가능하다면, 당해 부분을 의도된 용도로 사용하거나 판매가능한 상태에 이르기 하는 데 필요한 대부분의 활동을 완료한 시점에 차입원가의 자본화를 종료한다.', answer: 'O', explanation: '분할 완공 구조에서 완공된 부분이 독립적으로 사용 가능하다면 해당 파트의 자본화를 먼저 종료합니다.' },
  { id: 72, unit: '차입원가', text: '외화차입금과 관련되는 외환차이 중 이자원가의 조정으로 볼 수 있는 부분은 차입원가자본화 대상이 될 수 있다.', answer: 'O', explanation: '외화차입금 환율변동 효과 중 실질적인 이자율 조정 성격 부문은 자본화 가능한 차입원가에 가산/차감할 수 있습니다.' },
  { id: 73, unit: '차입원가', text: '적격자산에 대한 적극적인 개발활동을 중단한 기간에는 차입원가의 자본화를 중단한다.', answer: 'O', explanation: '실질적인 자산 가치 증대 개발활동이 멈춘 유휴 기간에 발행한 금융원가는 자본화하지 않고 당기 비용 처리합니다.' },
  { id: 74, unit: '차입원가', text: '자산을 의도된 용도로 사용하거나 판매가능한 상태에 이르기 위한 과정에 있어 일시적인 지연이 필수적인 과정인 경우에는 차입원가의 자본화를 중단하지 아니한다.', answer: 'O', explanation: '공사 과정상 기술적·자연적으로 필수 수반되는 불가피한 일시적 지연(예: 콘크리트 양생)의 경우에는 자본화를 중단하지 않고 계속 진행합니다.' },

  /* ── 금융부채 ── */
  { id: 75, unit: '금융부채', text: '액면이자율보다 시장이자율이 높은 경우 사채는 할인발행된다.', answer: 'O', explanation: '시장에서 요구하는 수익률이 액면이자율보다 높은 경우 사채는 \'할인발행\'됩니다.' },
  { id: 76, unit: '금융부채', text: '사채할인발행차금(또는 사채할증발행차금)은 유효이자율법을 적용하여 상각한다.', answer: 'O', explanation: 'K-IFRS에서는 금융부채의 발행차금 상각 시 반드시 정액법이 아닌 유효이자율법을 적용하여 회계처리하도록 요구합니다.' },
  { id: 77, unit: '금융부채', text: '사채를 할증발행한 경우 매년 인식하는 이자비용은 점점 감소하며 사채할증발행차금 상각액은 매년 증가한다.', answer: 'O', explanation: '할증발행 시 사채의 장부금액이 매년 감소하므로 이자비용은 줄어들지만, 발행차금 상각액은 할인/할증 무관하게 매년 증가합니다.' },
  { id: 78, unit: '금융부채', text: '상각후원가측정금융부채의 발행비용은 사채의 발행가액에서 차감한다.', answer: 'O', explanation: '상각후원가측정금융부채(AC금융부채)의 발행비용은 최초 인식 시 사채의 발행가액에서 차감하여 원가에 반영합니다.' },
  { id: 79, unit: '금융부채', text: '당기손익공정가치측정금융부채의 발행비용은 발생한 기간에 당기비용으로 처리한다.', answer: 'O', explanation: '공정가치로 측정하여 당기손익에 반영하는 금융부채(FVPL금융부채)의 발행비용은 발생하는 즉시 비용 처리합니다.' },
  { id: 80, unit: '금융부채', text: '당기손익공정가치측정금융부채의 이자비용은 액면이자 발생액을 이자비용으로 인식한다.', answer: 'O', explanation: '당기손익공정가치측정금융부채는 유효이자율법 상각을 수행하지 않으며, 매기 액면이자 발생액을 이자비용으로 직접 인식합니다.' },

  /* ── 자본 ── */
  { id: 81, unit: '자본', text: '유상증자시 증권인쇄비, 증권수수료 등 직접관련된 거래원가는 주식의 발행금액에서 차감하여 측정한다.', answer: 'O', explanation: '유상증자 시 직접 관련된 거래원가(발행비용)는 비용이 아니라 주식의 발행금액에서 직접 차감하여 자본 총량을 조정합니다.' },
  { id: 82, unit: '자본', text: '유상증자시 자본 총계가 증가하고, 무상증자시 자본 총계에 미치는 영향은 없다.', answer: 'O', explanation: '유상증자는 외부 자산이 유입되므로 자본총계가 늘어나지만, 무상증자는 자본항목 간의 대체일 뿐이므로 자본총계 자체는 변동이 없습니다.' },
  { id: 83, unit: '자본', text: '자기주식은 자본의 차감계정으로 인식한다.', answer: 'O', explanation: '자기주식은 자산이 아니며, 자본의 차감계정(자본조정)으로 인식하여 자본 총계에서 차감 표시합니다.' },
  { id: 84, unit: '자본', text: '현금으로 배당하는 금액만큼 이익잉여금이 감소한다.', answer: 'O', explanation: '현금배당은 이익잉여금(미처분이익잉여금)의 감소를 가져오며, 자본금에는 영향을 주지 않습니다.' },
  { id: 85, unit: '자본', text: '자본변동표란 한 회계기간 동안의 자본의 항목별 증감내역을 보여주는 재무제표이다.', answer: 'O', explanation: '자본변동표는 특정 시점의 정적 내역이 아니라, 한 회계기간 동안 발생한 자본 각 항목의 동적 증감 변동을 보여주는 보고서입니다.' },
  { id: 86, unit: '자본', text: '배당선언일에 미처분이익잉여금을 감소시키고 관련부채를 인식한다.', answer: 'O', explanation: '공식적으로 배당 의무가 확정되는 주주총회 등의 \'배당선언일\'에 이익잉여금을 줄이고 부채(미지급배당금)를 잡습니다.' },
  { id: 87, unit: '자본', text: '무액면주식을 발행하는 경우 발행금액의 2분의 1 이상을 자본금으로 인식하므로 자본금이 증가한다.', answer: 'O', explanation: '상법상 무액면주식 발행 시에도 발행금액의 일정 비율 이상을 자본금으로 계상하므로 기업의 자본금은 반드시 증가합니다.' },
  { id: 88, unit: '자본', text: '주식분할의 경우 자본총계는 변동이 없지만 발행주식수는 증가한다.', answer: 'O', explanation: '주식분할은 주식의 액면가를 쪼개 수만 늘리는 것이므로 자본 총액이나 자본금은 그대로이고 발행주식수만 늘어납니다.' },
  { id: 89, unit: '자본', text: '출자전환으로 인하여 소멸된 금융부채의 장부금액과 발행한 지분상품의 차이는 당기손익으로 인식한다.', answer: 'O', explanation: '부채를 주식으로 상환하는 출자전환 시, 소멸 부채액과 지분상품(공정가치) 간의 차액은 자본잉여금이 아니라 \'당기손익(채무조정손익)\'으로 계상합니다.' },
  { id: 90, unit: '자본', text: '현물출자로 취득한 자산의 취득원가는 해당 자산의 공정가치로 한다.', answer: 'O', explanation: '현물출자로 자산을 취득하는 경우, 원칙적으로 취득한 \'해당 자산의 공정가치\'를 취득원가로 삼습니다.' },
  { id: 91, unit: '자본', text: '자기지분으로 결제되는 계약이 인도할 자기지분상품의 수량이 변동가능한 비파생상품인 경우 금융부채로 분류한다.', answer: 'O', explanation: '인도할 주식 수가 고정되지 않고 가치 변동에 따라 움직인다면(fixed-for-fixed 미충족), 자본이 아니라 \'금융부채\'의 성격을 가집니다.' },
  { id: 92, unit: '자본', text: '우선주의 발행자가 특정일이나 그 이후에 확정되거나 결정가능한 금액의 상환을 청구할 수 있는 권리를 보유하는 경우 자본으로 분류한다.', answer: 'O', explanation: '상환 권리를 청구할 수 있는 주체가 \'발행자(기업)\'에게 있다면 기업이 강제적으로 현금을 지급해야 할 현재의무가 없으므로 \'자본\'으로 분류됩니다.' },

  /* ── 충당부채와 우발상황 ── */
  { id: 93, unit: '충당부채', text: '충당부채는 지출하는 시기 또는 금액이 불확실한 부채이다. 해당 의무를 이행하기 위하여 경제적 효익이 있는 자원을 유출할 가능성이 높고, 그 금액을 신뢰성 있게 측정할 수 있는 경우 재무상태표에 부채로 인식한다.', answer: 'O', explanation: 'K-IFRS 기준 상 충당부채의 자원 유출 가능성 요건은 \'높고(Probable, >50%)\'입니다.' },
  { id: 94, unit: '충당부채', text: '우발부채는 재무상태표에 부채로 인식되지 않고 주석으로 공시한다.', answer: 'O', explanation: '우발부채는 현재의무가 아니거나 유출가능성이 낮아 재무상태표 부채로 올릴 수 없으므로 오직 주석 공시 대상입니다.' },
  { id: 95, unit: '충당부채', text: '우발부채에 대한 주석공시가 관련 분쟁에 현저하게 불리한 영향을 미칠 것으로 예상되는 경우에도 예외적으로 그에 관한 공시를 생략할 수 있다.', answer: 'O', explanation: '소송 등 상대방과의 분쟁에서 기업에 심각하고 현저하게 불리한 영향을 미칠 극히 드문 상황이라면 예외적으로 주석 공시를 생략하는 것이 허용됩니다.' },
  { id: 96, unit: '충당부채', text: '의무를 이행하기 위하여 경제적 효익이 있는 자원을 유출할 가능성이 희박하다면 우발부채의 주석공시를 생략할 수 있다.', answer: 'O', explanation: '유출 가능성이 단순히 \'낮은\' 정도로는 안 되지만, 가능성이 아주 \'희박하다면(Remote)\' 생략할 수 있습니다.' },
  { id: 97, unit: '충당부채', text: '과거에 우발부채로 처리하였더라도 미래 경제적 효익의 유출 가능성이 높아진 경우에는 그러한 가능성의 변화가 생긴 기간의 재무제표에 충당부채로 인식한다.', answer: 'O', explanation: '상황이 바뀌어 자원 유출 확률이 \'높음\' 조건에 도달했다면 변화를 발견한 당기 기간의 재무제표에 정식 충당부채로 즉시 잡아야 합니다.' },
  { id: 98, unit: '충당부채', text: '우발자산은 경제적 효익의 유입 가능성이 높은 경우 주석으로 공시한다.', answer: 'O', explanation: '우발자산은 유입 가능성이 \'높은 경우\' 주석으로 공시합니다.' },
  { id: 99, unit: '충당부채', text: '의무에는 언제나 해당 의무의 이행 대상이 되는 상대방이 존재한다. 그러나 상대방이 누구인지 반드시 알아야 하는 것은 아니며 경우에 따라서는 일반 대중일 수도 있다.', answer: 'O', explanation: '이행 대상 상대방이 실재해야 하지만 그가 특정 누구인지 명확히 식별되어야 하는 것은 아닙니다.' },
  { id: 100, unit: '충당부채', text: '비슷한 의무가 다수 있는 경우에 의무 이행에 필요한 자원의 유출가능성은 해당 의무 전체를 고려하여 판단한다.', answer: 'O', explanation: '유사한 성격의 의무가 다량 포진해 있는 구조라면 단건별이 아닌 \'해당 의무 전체의 집합\'을 통합적으로 고려하여 확률적 유출가능성을 판단합니다.' },
  { id: 101, unit: '충당부채', text: '제3자와 연대하여 의무를 지는 경우에는 이행할 전체 의무 중 제3자가 이행할 것으로 예상되는 부분을 우발부채로 처리하고, 기업이 이행할 것으로 예상되는 부분을 충당부채로 처리한다.', answer: 'O', explanation: '연대 채무 구도에서는 기업 자체의 몫만 충당부채로 올리고, 제3자가 대위변제 등으로 갚아줄 것으로 보이는 부분은 우발부채로 빼서 주석 처리합니다.' },
  { id: 102, unit: '충당부채', text: '미래의 예상 영업손실은 충당부채로 인식하지 아니한다.', answer: 'O', explanation: '미래의 예상 영업손실은 기말 시점의 과거 사건에 기인한 현재의무가 아니므로 어떠한 경우에도 충당부채로 인식할 수 없습니다.' },
  { id: 103, unit: '충당부채', text: '충당부채는 세전 금액으로 측정한다.', answer: 'O', explanation: '충당부채 지출 원가 추정치와 현재가치 평가용 할인율을 산출할 때는 세금 효과를 제거한 \'세전\' 기준을 적용해야 합니다.' },
  { id: 104, unit: '충당부채', text: '화폐의 시간가치 영향이 중요한 경우 충당부채는 의무를 이행하기 위하여 예상되는 지출액의 현재가치로 평가한다.', answer: 'O', explanation: '화폐의 시간가치 영향이 유의적이고 중요하다면 반드시 미래 지출 원가를 현재가치(PV)로 할인하여 평가·반영해야 합니다.' },
  { id: 105, unit: '충당부채', text: '충당부채의 현재가치평가시 적용할 할인율은 부채의 특유한 위험과 화폐의 시간가치에 대한 현행 시장의 평가를 반영한 세전 이율이다.', answer: 'O', explanation: '적용 할인율 역시 세금이 감안되지 않은 \'세전 이율\'을 기준으로 채택하여 적용합니다.' },
  { id: 106, unit: '충당부채', text: '충당부채의 현재가치평가시 적용할 할인율에는 미래현금흐름을 추정할 때 고려한 위험을 반영하지 아니한다.', answer: 'O', explanation: '미래의 현금 지출액 추정 과정에서 이미 해당 부채 특유의 위험 요소를 가산했다면, 할인율에 또 위험을 얹을 시 이중 계산 오류가 나기 때문에 할인율에선 제외합니다.' },
  { id: 107, unit: '충당부채', text: '현재의무를 이행하기 위하여 필요한 지출 금액에 영향을 미치는 미래사건이 일어날 것이라는 충분하고 객관적인 증거가 있는 경우에는 그 미래사건을 고려하여 충당부채 금액을 추정한다.', answer: 'O', explanation: '새로운 법규 개정안 발효나 명백한 기술 발달 증거가 잡힌다면 이를 반영해 충당부채의 규모를 연동 추정합니다.' },
  { id: 108, unit: '충당부채', text: '예상되는 자산 처분이 충당부채를 생기게 한 사건과 밀접하게 관련되었더라도 예상되는 자산 처분이익은 충당부채를 측정하는 데 고려하지 아니한다.', answer: 'O', explanation: '충당부채를 산정할 때 향후 연계된 자산을 팔아 얻을 \'예상 처분이익\'은 부채 금액에서 차감하거나 상계하여 고려하지 않습니다.' },
  { id: 109, unit: '충당부채', text: '충당부채를 결제하기 위하여 필요한 지출액의 일부나 전부를 제3자가 변제할 것으로 예상되는 경우에는 기업이 의무를 이행한다면 변제를 받을 것이 거의 확실하게 되는 때에만 변제금액을 별도의 자산으로 인식하고 회계처리한다.', answer: 'O', explanation: '제3자 변제금은 부채에서 깎지 않고 \'거의 확실(Virtually certain)\'할 때 단독 계정의 \'별도 자산\'으로 분리 인식합니다.' },
  { id: 110, unit: '충당부채', text: '충당부채와 관련하여 포괄손익계산서에 인식한 비용은 제3자의 변제와 관련하여 인식한 금액과 상계하여 표시할 수 있다.', answer: 'O', explanation: '재무상태표 자산-부채 상계는 금지되나, 포괄손익계산서의 비용 항목은 변제 수익과 서로 넷(Net)으로 상계 표시가 허용됩니다.' },
  { id: 111, unit: '충당부채', text: '손실부담계약충당부채는 계약을 이행하기 위하여 필요한 원가와 계약을 이행하지 못하였을 때 지급하여야 할 보상금이나 위약금 중 작은 금액으로 측정한다.', answer: 'O', explanation: '계약 유지를 위한 순지출액과 해지 시 무는 패널티(위약금) 중 기업 손실을 최소화할 수 있는 \'작은 금액(MIN)\'을 충당부채로 잡습니다.' },
  { id: 112, unit: '충당부채', text: '구조조정에 대한 의제의무는 기업이 구조조정에 대한 구체적인 공식 계획을 가지고 있으며 기업이 구조조정 계획의 실행에 착수하였거나 구조조정의 주요 내용을 공표함으로써 구조조정의 영향을 받을 당사자가 기업이 구조조정을 실행할 것이라는 정당한 기대를 갖게 한 경우 발생한다.', answer: 'O', explanation: '단순 내부 계획 수립 외에, 실행 착수를 했거나 외부 공표를 거쳐 영향 대상자들에게 실행할 것이라는 \'정당한 기대\'를 유발했을 때 의무가 개시됩니다.' },
  { id: 113, unit: '충당부채', text: '보고기간 후부터 재무제표 발행승인일 전 사이에 배당을 선언한 경우에는 배당선언일에 부채를 인식한다.', answer: 'O', explanation: '기말 시점에는 배당 지급 현재의무가 도래하지 않았으므로 기말 부채가 될 수 없으며, 추후 공식 주주총회 등에서 확정 의결한 \'배당선언일 당기\'의 부채로 인식합니다.' },
  { id: 114, unit: '충당부채', text: '보고기간 말과 재무제표 발행승인일 사이에 투자자산의 공정가치의 하락은 수정을 요하지 않는 보고기간후사건이다.', answer: 'O', explanation: '기말 이후 발생한 시가나 자산 가치 낙폭은 기말의 기존 상태 수정 조건이 아니라 기말 이후의 시장 변동이므로 \'수정을 요하지 않는 사건\'입니다.' },
  { id: 115, unit: '충당부채', text: '보고기간 후에 발생한 화재로 인한 주요 생산 설비의 파손은 수정을 요하지 않는 보고기간후사건이다.', answer: 'O', explanation: '기말 이후 새로 일어난 돌발 재해이므로 기말 장부를 직접 수정하지 않고 주석으로 중요 사실만 적는 \'수정을 요하지 않는 사건\'입니다.' },
  { id: 116, unit: '충당부채', text: '경영진이 보고기간 후에 기업을 청산하거나 경영활동을 중단할 의도를 가지고 있다고 판단하는 경우에는 계속기업의 기준에 따라 재무제표를 작성해서는 아니 된다.', answer: 'O', explanation: '기말 이후에 확인된 청산 의도라 할지라도 재무제표 확정승인 전이라면 계속기업 가정이 전면 부정되므로 계속기업 기준 작성을 즉시 중단해야 합니다.' },

  /* ── 개념체계 ── */
  { id: 117, unit: '개념체계', text: '개념체계는 회계기준이 아니다. 따라서 개념체계의 어떠한 내용도 회계기준이나 그 요구사항에 우선하지 않는다.', answer: 'O', explanation: '개념체계는 일반 원리지침일 뿐 법적 효력을 갖는 공식 K-IFRS 기준서에 종속되므로 상충 시 회계기준서가 우선합니다.' },
  { id: 118, unit: '개념체계', text: '일반목적재무보고는 보고기업의 가치를 보여주기 위해 고안된 것이 아니다.', answer: 'O', explanation: '일반목적재무보고는 정보이용자들이 스스로 기업 가치를 \'추정하는 데 도움이 되는 정보\'를 제공할 뿐 가치 자체를 직접 알려주지는 않습니다.' },
  { id: 119, unit: '개념체계', text: '일반목적재무보고가 공통된 정보 수요에 초점을 맞춘다고 해서 보고기업으로 하여금 주요이용자의 특정 일부에게 가장 유용한 추가 정보를 포함하지 못하게 하는 것은 아니다.', answer: 'O', explanation: '범용 정보에 집중한다고 해서 특정 이용자층에게 더 유용하게 쓰일 부가적 유용한 정보를 공시 대상에서 강제 배제하는 규정은 없습니다.' },
  { id: 120, unit: '개념체계', text: '재무보고는 정확한 서술보다는 상당 부분 추정, 판단 및 모형에 근거한다.', answer: 'O', explanation: '재무보고는 고정된 실측 서술보다는 회계 처리에 상당 부분 \'추정, 판단 및 모형에 근거\'하여 합리적으로 작성됩니다.' },
  { id: 121, unit: '개념체계', text: '재무정보가 유용하기 위한 근본적 질적 특성은 목적적합성과 표현충실성이다.', answer: 'O', explanation: 'K-IFRS 체제 하에서 재무정보가 신뢰성 대신 표현충실성을 도입하여, 목적적합성과 표현충실성을 2대 근본적 질적특성으로 정의합니다.' },
  { id: 122, unit: '개념체계', text: '재무정보가 예측가치를 갖기 위해서 그 자체가 예측치 또는 예상치일 필요는 없다.', answer: 'O', explanation: '과거 정보라 할지라도 이용자가 미래를 예측하는 프로세스의 입력값으로 활용할 수 있다면 훌륭한 예측가치를 가집니다.' },
  { id: 123, unit: '개념체계', text: '중요성은 개별 기업 재무보고서 관점에서 해당 정보와 관련된 항목의 성격이나 규모 또는 이 둘 모두에 근거하여 해당 기업에 특유한 측면의 목적적합성을 의미한다.', answer: 'O', explanation: '중요성은 개별 기업의 특유한 환경, 성격, 규모에 따라 상대적으로 귀속되므로 회계기준위원회가 일률적인 임계 규격을 사전에 미리 정할 수 없습니다.' },
  { id: 124, unit: '개념체계', text: '합리적인 추정치의 사용은 재무정보의 작성에 필수적인 부분이며, 추정이 명확하고 정확하게 기술되고 설명되는 한 정보의 유용성을 저해하지 않는다.', answer: 'O', explanation: '추정이 개입된다고 해서 자산 정보 가치가 훼손되는 것은 아니며 정확한 근거와 가정이 투명하게 명시된다면 유용성이 유지됩니다.' },
  { id: 125, unit: '개념체계', text: '완전한 서술은 필요한 기술과 설명을 포함하여 정보이용자가 서술되는 현상을 이해하는 데 필요한 모든 정보를 포함하는 것을 의미한다.', answer: 'O', explanation: '단순히 물리적 항목의 전체 정보가 아니라, 정보이용자가 경제적 현상을 온전히 \'이해하는 데 필수적인 설명과 기술\'이 완비됨을 의미합니다.' },
  { id: 126, unit: '개념체계', text: '표현충실성은 모든 면에서 정확한 것을 의미하지는 않는다.', answer: 'O', explanation: '표현충실성이 모든 면에서 완전무결한 정확성(Accuracy)을 뜻하는 것은 아니며, 현상의 기술에 오류가 없고 적절한 절차가 충실히 이행되었음을 의미합니다.' },
  { id: 127, unit: '개념체계', text: '비교가능성은 목표이고 일관성은 그 목표를 달성하는 데 도움을 주는 수단이다.', answer: 'O', explanation: '비교가능성이라는 최상위 질적 목표를 이루기 위해 각 기간별 또는 기업별로 동일한 회계 규칙을 연동하는 \'일관성\'이 수단으로 기능합니다.' },
  { id: 128, unit: '개념체계', text: '하나의 경제적 현상은 여러 가지 방법으로 충실하게 표현될 수 있으나, 동일한 경제적 현상에 대해 대체적인 회계처리방법을 허용하면 비교가능성이 감소한다.', answer: 'O', explanation: '한 현상에 대해 기업마다 서로 다른 대체적 처리를 너무 많이 열어주면 통일성이 깨져 \'비교가능성이 감소\'합니다.' },
  { id: 129, unit: '개념체계', text: '검증가능성은 합리적인 판단력이 있고 독립적인 서로 다른 관찰자가 어떤 서술이 충실한 표현이라는 데, 비록 반드시 완전히 일치하지는 못하더라도 의견이 일치할 수 있다는 것을 의미한다.', answer: 'O', explanation: '관찰자들이 반드시 100% 완벽히 일치하는 단일 포인트 숫자에만 합의해야 하는 것은 아니며, 특정 범위나 확률 분포상 의견 합치가 이뤄져도 검증이 가능합니다.' },
  { id: 130, unit: '개념체계', text: '재무보고서는 사업활동과 경제활동에 대해 합리적인 지식이 있고, 부지런히 정보를 검토하고 분석하는 정보이용자를 위해 작성된다.', answer: 'O', explanation: '재무제표는 아무런 경제 지식이 없는 일반인을 기준으로 삼지 않고, 부지런하고 합리적인 이해력을 지닌 정보이용자를 전제로 설계됩니다.' },
  { id: 131, unit: '개념체계', text: '보고기업은 재무제표를 작성해야 하거나 작성하기로 선택한 기업이다. 보고기업은 단일의 실체이거나 어떤 실체의 일부일 수 있으며, 둘 이상의 실체로 구성될 수도 있다.', answer: 'O', explanation: '보고기업이 반드시 하나의 법적 단일 실체일 필요는 없으며, 지배-종속기업의 집합체처럼 \'둘 이상의 실체로 구성\'될 수도 있습니다.' },
  { id: 132, unit: '개념체계', text: '자산을 취득하거나 창출할 때의 역사적 원가는 거래원가를 포함한다.', answer: 'O', explanation: '역사적 원가 측정 시 자산 취득 과정의 부대 비용인 거래원가는 원가에 포함(가산)하는 것이 규정입니다.' },
  { id: 133, unit: '개념체계', text: '부채가 발생하거나 인수할 때의 역사적 원가는 수취한 대가에서 거래원가를 차감한 가치이다.', answer: 'O', explanation: '부채의 역사적 원가는 수취한 대가에서 거래원가를 차감(공제)한 순유입액 성격 가치로 최초 측정합니다.' },
  { id: 134, unit: '개념체계', text: '자본을 실물생산능력으로 정의한 실물자본유지개념 하에서 자산과 부채의 가치 변동으로 발생하는 보유손익은 기업의 생산능력 측정치 변동이므로 이익이 아니라 자본유지조정으로 처리한다.', answer: 'O', explanation: '실물자본유지 개념에서는 물리적 자산 규모가 커져야만 이익이며 단순 시가 변동분은 자본의 유지를 위한 \'자본유지조정(자본항목)\'으로 묶어둡니다.' },
  { id: 135, unit: '개념체계', text: '실물자본유지개념을 사용하여 재무제표를 구성하기 위해서는 자산과 부채를 현행원가에 의해 측정하여야 한다.', answer: 'O', explanation: '실물생산능력을 추정·유지하기 위해서는 과거 취득 가격이 아닌 현재 시점 기준의 가치인 \'현행원가(Current Cost)\'에 기반하여 측정해야 합니다.' },
  { id: 136, unit: '개념체계', text: '어떤 경우에는 인식을 위한 회계단위와 측정을 위한 회계단위를 서로 다르게 선택하는 것이 적절할 수 있다.', answer: 'O', explanation: '필요에 따라 인식 단위와 측정 단위를 서로 다르게 선택 적용하는 회계 처리가 허용됩니다.' },
  { id: 137, unit: '개념체계', text: '보고기업은 단일의 실체이거나 어떤 실체의 일부일 수 있으며, 둘 이상의 실체로 구성될 수도 있다.', answer: 'O', explanation: '보고기업이 반드시 하나의 법적 단일 실체일 필요는 없으며, 지배-종속기업의 집합체처럼 \'둘 이상의 실체로 구성\'될 수도 있습니다.' },
  { id: 138, unit: '개념체계', text: '보고기업이 지배기업과 종속기업으로 구성된다면 그 보고기업의 재무제표를 \'연결재무제표\'라고 부른다.', answer: 'O', explanation: '경제적 단일 실체처럼 작성하는 법적 연합 명칭은 연결재무제표입니다.' },
  { id: 139, unit: '개념체계', text: '자산을 취득하거나 창출할 때의 역사적 원가는 거래원가를 포함한다.', answer: 'O', explanation: '역사적 원가 적용 시 자산의 거래원가는 자산 원가에 포함(가산)되어야 합니다.' },
  { id: 140, unit: '개념체계', text: '부채가 발생하거나 인수할 때의 역사적 원가는 발생시키거나 인수하면서 수취한 대가에서 거래원가를 차감한 가치이다.', answer: 'O', explanation: '부채의 역사적 원가는 수취 대가 총액에서 거래원가를 차감한 가치입니다.' },
  { id: 141, unit: '개념체계', text: '사용가치와 이행가치에는 기업이 자산을 궁극적으로 처분하거나 부채를 이행할 때 발생할 것으로 기대되는 거래원가의 현재가치가 포함된다.', answer: 'O', explanation: '이들 가치에는 미래 이행/처분 시 발생하는 거래원가의 현재가치가 산식에 반영(포함)됩니다.' },
  { id: 142, unit: '개념체계', text: '자산의 현행원가는 측정일에 동등한 자산의 원가로서 측정일에 지급할 대가와 그 날에 발생할 거래원가를 포함한다.', answer: 'O', explanation: '현행원가는 다시 조달할 가치를 의미하므로 당시 지급 대가 및 거래원가를 모두 포함하여 구성합니다.' },
  { id: 143, unit: '개념체계', text: '부채의 현행원가는 측정일에 동등한 부채에 대해 수취할 수 있는 대가에서 그 날에 발생할 거래원가를 차감한다.', answer: 'O', explanation: '부채의 현행원가는 동등 부채 인수 시 수취 가능한 대가에서 거래원가를 차감하여 계산합니다.' },
  { id: 144, unit: '개념체계', text: '자본을 불변구매력단위로 정의한다면 이익은 해당 기간 중 투자된 구매력의 증가를 의미하게 된다. 따라서 일반물가수준에 따른 가격상승을 초과하는 자산가격의 증가 부분만이 이익으로 간주되며, 그 이외의 가격증가 부분은 자본의 일부인 자본유지조정으로 처리된다.', answer: 'O', explanation: '불변구매력 단위 하에선 일반 물가상승률을 초과하여 자산 가격이 뛴 알짜 증가분만 이익으로 봅니다.' },
  { id: 145, unit: '개념체계', text: '자본을 실물생산능력으로 정의한 실물자본유지개념 하에서 이익은 해당 기간 중 실물생산능력의 증가를 의미하며, 보유손익은 이익이 아니라 자본의 일부인 자본유지조정으로 처리된다.', answer: 'O', explanation: '실물자본유지개념에서 보유손익은 진정한 생산력 증가가 아니므로 이익 처리하지 않고 자본유지조정으로 돌립니다.' },
  { id: 146, unit: '개념체계', text: '실물자본유지개념을 사용하기 위해서는 자산과 부채를 현행원가에 의해 측정하여야 한다.', answer: 'O', explanation: '실물생산 캐파 능력을 제대로 파악·유지하려면 과거 취득가가 아닌 다시 조달할 단가인 \'현행원가\' 기준 측정이 절대적입니다.' },
  { id: 147, unit: '개념체계', text: '어떤 경우에는 인식을 위한 회계단위와 측정을 위한 회계단위를 서로 다르게 선택하는 것이 적절할 수 있다.', answer: 'O', explanation: '필요에 따라 인식 단위와 측정 단위를 서로 다르게 선택 적용하는 회계 처리가 허용됩니다.' },
  { id: 148, unit: '개념체계', text: '단일 회계단위로 권리와 의무의 집합을 처리하는 것은 자산과 부채를 상계하는 것과 다르다.', answer: 'O', explanation: '복합 권리·의무 계약의 경제적 실질을 단일 단위로 처리하는 회계는 자산/부채를 단순 지워 없애는 상계와는 별개입니다.' },
  { id: 149, unit: '개념체계', text: '미이행계약은 경제적자원을 교환할 권리와 의무가 결합되어 성립된다. 결합된 권리와 의무는 단일 자산 또는 단일 부채를 구성한다.', answer: 'O', explanation: '쌍방 미이행 계약 내 권리와 의무는 엮여 상호의존적이므로 분리되지 않고 묶여서 단일 회계단위를 구성합니다.' },
  { id: 150, unit: '개념체계', text: '실질이 없는 조건은 무시된다.', answer: 'O', explanation: '형식적으로만 존재하고 실제 경제적 실질이 수반되지 않는 약정 조건들은 회계 왜곡 방지를 위해 무시하는 것이 실질우선주의 원칙입니다.' },

  /* ── 재무제표 표시 ── */
  { id: 151, unit: '재무제표', text: '당기손익과 기타포괄손익은 단일의 포괄손익계산서에 두 부분으로 나누어 표시하거나, 별개의 보고서로 분리하여 표시할 수 있다.', answer: 'O', explanation: '두 가지 표시 방법 모두 기준서에서 허용합니다.' },
  { id: 152, unit: '재무제표', text: '재무제표 이외의 보고서(예: 경영진 명세서, 환경 보고서)는 한국채택국제회계기준의 적용범위에 해당하지 않는다.', answer: 'O', explanation: 'K-IFRS는 공식 재무제표 체계 및 주석 보고서에만 엄격히 효력을 적용합니다.' },
  { id: 153, unit: '재무제표', text: '기업은 현금흐름 정보를 제외하고는 발생기준 회계를 사용하여 재무제표를 작성한다.', answer: 'O', explanation: '현금흐름표만 유일하게 현금기준을 잣대로 작성됩니다.' },
  { id: 154, unit: '재무제표', text: '상이한 성격이나 기능을 가진 항목은 구분하여 표시한다. 다만 중요하지 않은 항목은 성격이나 기능이 유사한 항목과 통합하여 표시할 수 있다.', answer: 'O', explanation: '중요한 항목은 성격이나 기능이 유사하더라도 구분 표시해야 하지만, 중요치 않은 항목은 통합 표기할 수 있습니다.' },
  { id: 155, unit: '재무제표', text: '한국채택국제회계기준의 요구에 따라 공시되는 정보가 중요하지 않다면 그 공시를 제공할 필요가 없다.', answer: 'O', explanation: '구체적 공시 요구 사항이라 할지라도 중요치 않다면 재무제표에 공시를 제공하지 않아도 됩니다.' },
  { id: 156, unit: '재무제표', text: '재고자산에 대한 재고자산평가충당금과 매출채권에 대한 대손충당금과 같은 평가충당금을 차감하여 관련 자산을 순액으로 측정하는 것은 상계표시에 해당하지 아니한다.', answer: 'O', explanation: '충당금을 원가에서 빼 실질 가치로 적는 행위는 상계표시에 해당하지 않습니다.' },
  { id: 157, unit: '재무제표', text: '외환손익 또는 단기매매 금융상품에서 발생하는 손익과 같이 유사한 거래의 집합에서 발생하는 차익과 차손은 그러한 차익과 차손이 중요한 경우에는 구분하여 표시한다.', answer: 'O', explanation: '유사 거래 집합 손익은 순액 표기가 되지만, 차손익 금액 규모가 중요할 때는 구분(총액) 표시해야 합니다.' },
  { id: 158, unit: '재무제표', text: '당기 재무제표를 이해하는 데 목적적합하다면 서술형 정보의 경우에도 비교정보를 포함한다.', answer: 'O', explanation: '금액뿐만 아니라 서술형 설명 정보라 할지라도 당기 이해에 유용하면 전기 비교정보를 반드시 포함해야 합니다.' },
  { id: 159, unit: '재무제표', text: '표시방법의 변경은 변경된 구조가 지속적으로 유지될 가능성이 높아 비교가능성을 저해하지 않을 것으로 판단될 때 변경할 수 있다.', answer: 'O', explanation: '신뢰성 있고 더욱 목적적합한 정보 제공과 함께 향후 지속 고수 유지될 확률이 높아야 변경 가능합니다.' },
  { id: 160, unit: '재무제표', text: '유동성 순서에 따른 표시방법이 신뢰성 있고 더욱 목적적합한 정보를 제공하는 경우를 제외하고는 유동자산과 비유동자산, 유동부채와 비유동부채로 재무상태표에 구분하여 표시한다.', answer: 'O', explanation: '유동/비유동 구분이 원칙이지만, 유동성 순서 표시가 더 적합하면 유동성 표시를 허용합니다.' },
  { id: 161, unit: '재무제표', text: '유동자산은 보고기간 후 12개월 이내에 실현될 것으로 예상되지 않는 경우에도 재고자산, 매출채권과 같이 정상영업주기의 일부로서 판매, 소비 또는 실현되는 자산을 포함한다.', answer: 'O', explanation: '정상 영업주기 싸이클 내에 소모되는 재고와 채권은 회수 만기가 1년을 초과하더라도 유동자산 분류를 고수합니다.' },
  { id: 162, unit: '재무제표', text: '기업이 기존의 대출계약조건에 따라 보고기간 후 적어도 12개월 이상 부채를 차환하거나 연장할 것으로 기대하고 있고, 그런 재량권이 있다면, 보고기간 후 12개월 이내에 만기가 도래한다 하더라도 비유동부채로 분류한다.', answer: 'O', explanation: '기업에게 연장 또는 차환할 수 있는 자율 주도 재량권 권리가 1년 이상 확보되어 있다면 만기가 임박했어도 비유동부채 지위가 보존됩니다.' },
  { id: 163, unit: '재무제표', text: '보고기간 말 이전에 장기차입약정을 위반했을 때 대여자가 즉시 상환을 요구할 수 있는 채무는 보고기간 후 재무제표 발행승인일 전에 채권자가 약정위반을 이유로 상환을 요구하지 않기로 합의하더라도 유동부채로 분류한다.', answer: 'O', explanation: '계약 위반으로 청구권이 넘어간 채무는 기말 당일 밤 기준 조건 상태를 대변하므로 유동부채입니다.' },
  { id: 164, unit: '재무제표', text: '별개의 손익계산서를 표시하는 경우, 포괄손익을 표시하는 보고서에는 당기손익 부분을 표시하지 않는다.', answer: 'O', explanation: '앞 장 손익계산서 끝줄의 당기순이익에서 뒷 장 포괄손익서가 시작되어 OCI만 가감하므로 중복 기술을 생략합니다.' },
  { id: 165, unit: '재무제표', text: '조정영업이익 등의 명칭을 사용하여 표시하고자 할 때는 손익계산서 본문이 아닌 주석으로 공시할 수 있다.', answer: 'O', explanation: 'K-IFRS 기준 외 기업 고유의 조정영업이익 성과지표 소통은 본문 줄 추가가 금지되며 주석실에서 허용됩니다.' },
  { id: 166, unit: '재무제표', text: '기타포괄손익은 성격별로 분류하여 표시한다.', answer: 'O', explanation: 'OCI 항목들은 비용과 달리 성격별/기능별 선택권이 없고 오직 법에 따라 \'성격별 분류 표기\'만 가능합니다.' },
  { id: 167, unit: '재무제표', text: '기타포괄손익은 관련 법인세효과를 차감한 순액으로 표시하거나 법인세효과 반영 전 금액으로 표시하고, 각 항목들에 관련된 법인세효과는 단일 금액으로 합산하여 표시할 수 있다.', answer: 'O', explanation: '세후 순액 기재법과 세전 표기 후 법인세 일괄 합산 표기법 두 방식 모두 기준서에서 허용합니다.' },
  { id: 168, unit: '재무제표', text: '수익과 비용의 어느 항목도 당기손익과 기타포괄손익을 표시하는 보고서 또는 주석에 특별손익 항목으로 표시할 수 없다.', answer: 'O', explanation: 'K-IFRS 체제 하에서는 \'특별손익\'이란 단어나 명칭 표기를 본문과 주석 전체 영역에서 전면 금지합니다.' },
  { id: 169, unit: '재무제표', text: '비용을 기능별로 분류한 기업은 비용의 성격에 대한 추가 정보를 주석으로 공시하여야 한다.', answer: 'O', explanation: '기능별 배분 기업은 성격별 원천 원가(급여, 감가비 등) 주석 공시가 의무 조항으로 박혀있습니다.' },
  { id: 170, unit: '재무제표', text: '기능별 분류는 성격별 분류보다 재무제표이용자에게 더욱 목적적합한 정보를 제공할 수 있지만 비용을 기능별로 배분하는 데 자의적인 배분과 상당한 정도의 판단이 개입될 수 있다.', answer: 'O', explanation: '매출원가 구출 등 기능 배분 방식은 유용하지만 비용을 각 부서 기능 타깃으로 쪼갤 때 자의적 주관 판단이 개입되는 한계가 있습니다.' },
  { id: 171, unit: '재무제표', text: '공정가치는 측정일에 시장참여자 사이의 정상거래에서 자산을 매도할 때 받거나 부채를 이전할 때 지급하게 될 가격으로 정의한다.', answer: 'O', explanation: '정상 구도 거래에서 자산을 양도 처분하며 수취할 유출가격(Exit price) 기준으로 공정가치를 정의 내립니다.' },
  { id: 172, unit: '재무제표', text: '공정가치 측정시 자산이나 부채의 주된 시장에서의 거래를 가정하며, 주된 시장이 없는 경우 가장 유리한 시장에서 거래된다고 가정한다.', answer: 'O', explanation: '가장 활발한 주된 시장이 1순위 타깃이며, 존재 안 할 때 차선책으로 기업 이익을 극대화해 줄 가장 유리한 시장을 무대로 삼습니다.' },
  { id: 173, unit: '재무제표', text: '자산이나 부채의 공정가치를 측정하기 위하여 사용하는 주된 (또는 가장 유리한) 시장의 가격에는 거래원가를 조정하지 않는다. 거래원가에는 운송원가를 포함하지 않는다.', answer: 'O', explanation: '중개 수수료 등 거래원가는 공정가치 시가에서 빼 보정하지 않으나, 장소적 이동을 위한 운송원가는 시가에서 빼서 보정해 줍니다.' },
  { id: 174, unit: '재무제표', text: '부채의 공정가치는 불이행위험의 영향을 반영한다.', answer: 'O', explanation: '채무 의무 시가 평가 시, 자사의 신용등급 하락 등 제때 못 갚을 위험 요인(불이행 위험) 효과도 반영됩니다.' },
  { id: 175, unit: '재무제표', text: '가치평가기법이나 그 적용방법이 바뀜에 따른 수정은 회계추정의 변경으로 보아 회계처리한다.', answer: 'O', explanation: '시가 산출용 모형 산식을 고도화 타 기법으로 변경 적용하는 행위는 최선의 측정치 수정을 뜻하는 \'회계추정의 변경\'이라 전진법 처리합니다.' },
  { id: 176, unit: '재무제표', text: '수준 1의 투입변수는 측정일에 동일한 자산이나 부채에 대한 접근할 수 있는 활성시장의 (조정하지 않은) 공시가격을 말한다.', answer: 'O', explanation: '가장 신뢰성 만점인 서열 1순위 투입 소스는 아무 보정 작업을 거치지 않은 활성시장의 공시가격 그 자체입니다.' },
  { id: 177, unit: '재무제표', text: '관련 투입변수의 사용가능성과 이들 투입변수의 상대적인 주관성은 적절한 가치평가기법을 선택하는 데 영향을 미칠 수 있다.', answer: 'O', explanation: '긁어모을 데이터의 양과 통계 추정의 주관성 강도는 어떤 가치평가 모형 산식을 채택할지 결정구조에 영향을 가합니다.' },
  { id: 178, unit: '재무제표', text: '공정가치 서열체계는 투입변수에 우선순위를 부여하는 것이지 가치평가기법에 우선순위를 부여하는 것은 아니다.', answer: 'O', explanation: '공정가치 서열체계는 투입변수의 객관성 질적 수준에 등급을 매기는 것입니다.' },

  /* ── 금융자산 ── */
  { id: 179, unit: '금융자산', text: '투자지분상품은 사업모형을 고려할 필요가 없으며 FVPL금융자산으로 분류하는 것이 원칙이다.', answer: 'O', explanation: '지분상품(주식)은 SPPI 요건을 태생 위반하므로 사업모형 무관 FVPL이 기본 대원칙입니다.' },
  { id: 180, unit: '금융자산', text: '투자지분상품은 최초인식 시점에만 FVOCI금융자산으로 지정할 수 있으며, 이후 취소할 수 없다.', answer: 'O', explanation: '주식을 FVOCI로 지정하는 선택권은 최초 인식 시점에만 부여되며 이후 절대로 취소 불가합니다.' },
  { id: 181, unit: '금융자산', text: '금융자산은 최초 인식시 공정가치으로 측정한다.', answer: 'O', explanation: '금융자산은 취득 명목 대가 원가가 아닌 계약 체결 당일 시장 시가인 \'공정가치\' 기준으로 최초 측정해야 합니다.' },
  { id: 182, unit: '금융자산', text: '기타포괄손익공정가치측정금융자산에서 발생한 기타포괄손익누계액은 금융자산 제거시 채무상품은 당기손익으로 재분류조정하고 지분상품은 이익잉여금으로 직접대체한다.', answer: 'O', explanation: '채무상품(사채)은 제거 시 당기손익 재분류되지만 지분상품(주식)은 처분 제거 시 절대 손익 재분류가 불허되며 이익잉여금 직접 대체만 허용됩니다.' },
  { id: 183, unit: '금융자산', text: '주식배당이나 무상증자로 인하여 투자자가 무상주를 수령한 경우에는 배당수익을 인식하지 않는다.', answer: 'O', explanation: '무상주 수령은 단순 주식수 보정이므로 배당수익 잡지 않고 주당 단가만 낮추는 회계 처리를 수행합니다.' },
  { id: 184, unit: '금융자산', text: '상각후원가측정금융자산으로 분류한 투자채무상품 취득과 직접 관련된 거래원가는 최초 인식하는 공정가치에 가산하여 측정한다.', answer: 'O', explanation: 'AC 및 FVOCI 금융자산 취득 수수료 거래원가는 최초 자산 장부가에 가산(포함)하여 측정합니다.' },
  { id: 185, unit: '금융자산', text: '금융자산의 신용위험이 유의적으로 증가한 경우에는 전체기간 기대신용손실에 해당하는 금액으로 손실충당금을 측정한다.', answer: 'O', explanation: '떼일 위험(신용위험)이 최초 대비 눈에 띄게 유의 상승했다면 전체를 통산하는 \'전체기간 기대신용손실\' 충당금을 쌓아야 합니다.' },
  { id: 186, unit: '금융자산', text: '사업모형을 고려하지 않는 투자지분상품은 분류변경이 불가능하다.', answer: 'O', explanation: '금융자산 재분류 계정이동은 오직 채무상품(채권)에 한해서만 성립 허용되며 주식 지분상품은 분류변경이 불가능합니다.' },
  { id: 187, unit: '금융자산', text: '금융자산을 상각후원가 측정 범주에서 당기손익-공정가치 측정 범주로 재분류하는 경우에 재분류일의 공정가치로 측정하며 재분류 전 상각후원가와 공정가치의 차이에 따른 손익은 당기손익으로 인식한다.', answer: 'O', explanation: 'AC 범주에서 FVPL 범주로 이동할 때 터지는 장부가와 시가 격차액은 전액 \'당기손익\'으로 즉시 실현 처리합니다.' },
  { id: 188, unit: '금융자산', text: '금융자산을 기타포괄손익-공정가치 측정 범주에서 당기손익-공정가치 측정 범주로 재분류하는 경우에는 계속 공정가치로 측정하며 재분류 전에 인식한 기타포괄손익누계액은 재분류일에 재분류조정으로 자본에서 당기손익으로 재분류한다.', answer: 'O', explanation: 'FVOCI 채무상품이 FVPL방으로 이동할 때 기존 자본에 파킹돼 누적됐던 OCI 자본 항목은 당일 \'당기손익으로 재분류조정\'되어 빠져나옵니다.' },

  /* ── 수익인식 ── */
  { id: 1104, unit: '수익인식', text: '계약을 식별하기 위해서는 계약당사자들이 계약을 승인하고 각자의 의무를 수행하기로 확약해야 하며, 반드시 서면으로 이루어져야 한다.', answer: 'X', explanation: '서면뿐만 아니라 구두, 그 밖의 사업 관행에 따라 성립할 수 있습니다.' },
{ id: 1105, unit: '수익인식', text: '계약을 식별하기 위해서는 이전할 재화나 용역의 지급조건을 식별할 수 있어야 한다.', answer: 'O', explanation: '지급조건의 식별은 계약 식별의 필수 요건입니다.' },
{ id: 1106, unit: '수익인식', text: '고객에게 이전할 재화나 용역에 대하여 받을 권리를 갖게 될 대가의 회수 가능성이 매우 높아야 계약을 식별할 수 있다.', answer: 'X', explanation: '회수 가능성이 "매우 높아야" 하는 것은 아니며, 회수 가능성이 높음(probable) 정도면 충분합니다.' },
{ id: 1107, unit: '수익인식', text: '고객과의 계약에서 식별되는 수행의무는 계약에 분명히 기재된 재화나 용역에만 한정된다.', answer: 'X', explanation: '분명히 기재된 재화나 용역 외에 합리적으로 기대되는 수행의무도 포함될 수 있습니다.' },
{ id: 1108, unit: '수익인식', text: '거래가격에는 제3자를 대신해서 회수한 금액(예: 부가가치세 등)은 포함하지 않는다.', answer: 'O', explanation: '제3자를 대신하여 수취하는 금액은 기업의 수익이 아니므로 포함하지 않습니다.' },
{ id: 1109, unit: '수익인식', text: '고객과의 계약에서 약속한 대가에는 고정금액뿐만 아니라 변동금액도 포함될 수 있다.', answer: 'O', explanation: '고정금액과 변동금액을 모두 포함하여 거래가격을 산정합니다.' },
{ id: 1110, unit: '수익인식', text: '변동대가와 관련된 불확실성이 해소될 때, 이미 인식한 누적 수익 중 유의적인 부분을 되돌리지 않을 가능성이 매우 높은 정도까지만 변동대가의 일부나 전부를 거래가격에 포함한다.', answer: 'O', explanation: '수익의 유의적인 환입 가능성이 낮게(매우 높게 인식할 수 있도록) 제한하여 추정합니다.' },
{ id: 1111, unit: '수익인식', text: '유의적인 금융요소를 반영하여 약속한 대가를 조정할 때는 계약 개시 시점에 기업과 고객이 별도 금융거래를 한다면 반영하게 될 할인율을 사용한다.', answer: 'O', explanation: '별도 금융거래 시 적용될 시장 할인율을 사용합니다.' },
{ id: 1112, unit: '수익인식', text: '재화 이전 시점과 대가 지급 시점 간의 기간이 1년 이내라면 유의적인 금융요소 효과를 반영하여 대가를 조정하는 실무적 간편법을 적용할 수 있다.', answer: 'O', explanation: '1년 이내인 경우 금융요소 효과를 반영하지 않는 실무적 간편법 사용이 가능합니다.' },
{ id: 1113, unit: '수익인식', text: '재화나 용역의 계약상 표시가격이나 정가는 개별판매가격으로 간주될 수 있지만, 반드시 개별판매가격으로 보아야 하는 것은 아니다.', answer: 'O', explanation: '표시가격이 실제 개별판매가격과 다를 수 있으므로 무조건적인 간주를 해서는 안 됩니다.' },
{ id: 1114, unit: '수익인식', text: '거래가격의 후속 변동은 계약 개시 시점과 같은 기준으로 계약상 수행의무에 배분한다.', answer: 'O', explanation: '후속 변동분은 개시 시점의 배분 원칙을 그대로 적용합니다.' },
{ id: 1115, unit: '수익인식', text: '수행의무의 산출물을 합리적으로 측정할 수 없으나 원가는 회수될 것으로 예상되는 경우, 수익을 인식할 수 있다.', answer: 'X', explanation: '합리적으로 측정할 수 없는 경우, 원가 회수 가능 여부와 관계없이 수익을 인식하지 않습니다.' },
{ id: 1116, unit: '수익인식', text: '고객이 보증을 별도로 구매할 수 있는 선택권이 있다면 그 보증은 용역유형의 보증으로 회계처리한다.', answer: 'O', explanation: '별도 선택권이 있는 보증은 서비스 성격인 용역유형 보증입니다.' },
{ id: 1117, unit: '수익인식', text: '기업이 확정유형과 용역유형 보증을 모두 약속했으나 합리적으로 구별할 수 없는 경우, 용역유형의 보증으로 회계처리한다.', answer: 'O', explanation: '구별 불가능 시 보다 포괄적인 용역유형으로 처리합니다.' },
{ id: 1118, unit: '수익인식', text: '기업이 본인인 경우, 이전되는 재화나 용역과 교환하여 받을 권리를 갖게 될 대가의 총액을 수익으로 인식한다.', answer: 'O', explanation: '본인(Principal)은 거래 전체 금액을 수익으로 인식합니다.' },
{ id: 1119, unit: '수익인식', text: '선도나 콜옵션을 통한 재매입약정의 행사가격이 원래 판매가격보다 낮은 경우는 리스로, 높은 경우는 금융약정으로 회계처리한다.', answer: 'O', explanation: '낮은 경우 리스, 높은 경우 금융약정으로 분류하는 것이 원칙입니다.' },
{ id: 1120, unit: '수익인식', text: '계약체결 증분원가를 자산으로 인식하더라도, 상각기간이 1년 이하라면 발생시점에 비용으로 인식하는 실무적 간편법을 사용할 수 있다.', answer: 'O', explanation: '1년 이하의 단기 자산은 실무 편의를 위해 즉시 비용 처리가 가능합니다.' },
{ id: 1121, unit: '수익인식', text: '계약 범위가 확장되고 추가 대가가 개별판매가격만큼 상승하는 경우, 별도의 계약으로 본다.', answer: 'O', explanation: '추가된 범위와 가격이 개별판매가격과 일치한다면 별도 계약으로 간주합니다.' }

  /* ── 복합금융상품 ── */
  { id: 192, unit: '복합금융상품', text: '전환사채의 전체 발행가액은 사채 대가인 부채요소와 전환권 대가인 자본요소로 분리하여 인식한다.', answer: 'O', explanation: '복합금융상품인 전환사채는 순수 사채 부채 몫인 \'부채요소\'와 옵션 가치인 \'자본요소(전환권대가)\'를 수학적으로 분리 기재해야 합니다.' },
  { id: 193, unit: '복합금융상품', text: '전환권을 행사할 가능성이 사후에 변동되더라도 전환상품의 부채요소와 자본요소의 분류를 수정하지 아니한다.', answer: 'O', explanation: '최초 발행 당일 밤 결정 픽스된 부채와 자본 비율 지분선은 사후에 주가가 춤추어 행사 확률이 요동치더라도 장부 분류를 절대 사후 수정할 수 없습니다.' },

  /* ── 주식기준보상 ── */
  { id: 194, unit: '주식기준보상', text: '주식결제형 주식기준보상거래의 보상원가는 부여일 당일의 공정가치로 고정하며 기말 보고기간 말에 재측정하지 아니한다.', answer: 'O', explanation: '주식결제형 옵션은 자본 거래 성격이라 오직 태어난 날인 \'부여일 당일의 시가\'로 가치를 못 박아 픽스하며 기말에 절대 재측정하지 않습니다.' },
  { id: 195, unit: '주식기준보상', text: '현금결제형 주식기준보상거래의 경우, 부채가 결제될 때까지 매 보고기간 말과 결제일에 부채의 공정가치를 재측정하고 변동액은 당기손익으로 인식한다.', answer: 'O', explanation: '현금결제형은 줄 현금액을 구해야 하므로 결제 도달일까지 매 보고기간 말 시가로 재추정하여 \'당기손익\' 방에 차액을 정산합니다.' },

  /* ── 종업원급여 ── */
  { id: 196, unit: '종업원급여', text: '확정기여제도에서는 종업원이 보험수리적위험과 투자위험을 실질적으로 부담한다.', answer: 'O', explanation: '확정기여제도(DC)는 기업이 기여금만 내면 끝이므로 운용 실적에 따른 모든 위험과 효익은 종업원에게 전가됩니다.' },
  { id: 197, unit: '종업원급여', text: '확정기여제도에서는 채무나 비용을 측정하기 위해 보험수리적 가정을 할 필요가 없고, 그 결과 보험수리적 손익이 생길 가능성도 없다.', answer: 'O', explanation: '기업 의무가 불입으로 종결되므로 복잡한 미래 보험수리 추정 가정이나 평가 손익이 탄생할 여지가 없습니다.' },
  { id: 198, unit: '종업원급여', text: '확정기여제도의 재무제표는 급여지급에 이용가능한 순자산보고서와 기금적립정책에 관한 설명을 포함한다.', answer: 'O', explanation: '기여금 불입 자산의 상태 보고 위주로 구성되는 것이 기여제도 재무보고의 정석입니다.' },
  { id: 199, unit: '종업원급여', text: '기업은 확정급여제도의 공식적 규약에 따른 법적의무뿐만 아니라 비공식적 관행에서 생기는 의제의무도 회계처리를 한다.', answer: 'O', explanation: '명시적 규약 외에 관행상 지급 안 하면 신뢰가 깨지는 정당한 기대를 유발한 의제의무도 부채 계상 대상입니다.' },
  { id: 200, unit: '종업원급여', text: '확정급여채무를 할인하기 위해 사용하는 할인율은 보고기간 말 현재 우량회사채의 시장수익률을 참조하여 결정한다.', answer: 'O', explanation: '자사의 세전 자본비용이 아니라 시장의 우량회사채 공시 통계 이자율을 현행 할인 기준으로 차용합니다.' },
  { id: 201, unit: '종업원급여', text: '보험수리적손익을 포함한 재측정손익은 기타포괄손익으로 인식하며 후속 기간에 당기손익으로 재분류하지 않는다.', answer: 'O', explanation: '확정급여재측정요소(OCI)는 변동성이 심해 평정심 유지를 위해 자본에 영구 격리하며 당기손익 재분류를 전면 불허합니다.' },
  { id: 202, unit: '종업원급여', text: '과거근무원가는 정(+)의 금액이 될 수도 있고 부(-)의 금액이 될 수도 있다.', answer: 'O', explanation: '제도의 개정이나 축소 결과에 따라 혜택이 늘어나면 정(+), 혜택이 줄어들면 부(-)의 원가가 성립 가능합니다.' },
  { id: 203, unit: '종업원급여', text: '사외적립자산에서 발생하는 실제 투자수익은 별도의 영업외수익으로 인식하지 아니하고 확정급여채무 이자원가와 통산하여 순이자로 보고한다.', answer: 'O', explanation: '자산 수익과 채무 이자는 할인율 기반의 단일 순이자(Net interest) 항목으로 묶여 비용 통산 처리됩니다.' },
  { id: 204, unit: '종업원급여', text: '확정급여제도의 정산으로 인한 정산손익은 발생한 기간의 당기손익으로 인식한다.', answer: 'O', explanation: '제도의 청산·정산 시점에서 확정되는 정산손익은 미실현이 아니므로 즉시 당기손익방으로 직행합니다.' },
  { id: 205, unit: '종업원급여', text: '확정급여제도에서 발생한 재측정요소는 당기손익 재분류는 안 되지만 자본 내에서 이익잉여금 등으로 대체할 수 있다.', answer: 'O', explanation: '손익계산서를 거치는 재분류조정은 차단되나, 자본 계정 내부에서 잉여금방으로 직접 이사 대체하는 것은 허용됩니다.' },

  /* ── 리스 ── */
  { id: 206, unit: '리스', text: '리스제공자는 기초자산의 소유에 따른 위험과 보상의 대부분을 이전하는 리스는 금융리스로, 이전하지 않는 리스는 운용리스로 분류한다.', answer: 'O', explanation: '리스제공자는 위험·보상의 실질 실현 이전 여부에 따라 금융/운용 이분법 분류 조건을 유지합니다.' },
  { id: 207, unit: '리스', text: '리스이용자는 기초자산의 소유에 따른 위험과 보상의 대부분을 이전하는지 여부에 관계없이 원칙적으로 금융리스 방식으로 단일 회계처리한다.', answer: 'O', explanation: '리스이용자는 단기/소액 예외를 빼면 위험 이전과 상관없이 무조건 사용권자산과 리스부채를 잡는 단일모형을 씁니다.' },
  { id: 208, unit: '리스', text: '염가매수선택권이 있고 그 선택권을 행사할 것이 계약 개시 시점에 상당히 확실한 경우 해당 리스는 금융리스로 분류된다.', answer: 'O', explanation: '헐값에 살 권리가 확실하다면 자산의 실질 소유권이 넘어가는 구조이므로 금융리스 분류 가이드 라인을 충족합니다.' },
  { id: 209, unit: '리스', text: '운용리스 제공자는 정액 기준이나 다른 체계적인 기준으로 운용리스의 리스료를 수익으로 인식한다. 다른 체계적인 기준이 없는 경우 정액기준을 적용한다.', answer: 'O', explanation: '임대 수익 인식 시 기본은 정액법 1/n 분할이며 효익 소비를 더 잘 대변하는 타 체계적 방식이 있다면 차용 허용됩니다.' },
  { id: 210, unit: '리스', text: '리스이용자는 내재이자율을 쉽게 산정할 수 있는 경우에는 그 이자율로 리스료를 할인한다. 그 이자율을 쉽게 산정할 수 없는 경우에 리스이용자의 증분차입이자율을 사용한다.', answer: 'O', explanation: '1순위는 리스 계약 내부 내재율이며 파악 곤란 시 기업 자체의 신용 기반 조달 금리인 \'증분차입이자율\'을 대역 분모로 씁니다.' },
  { id: 211, unit: '리스', text: '기초자산이 소액인지는 절대적 기준에 따라 평가한다.', answer: 'O', explanation: '기업의 자산 규모나 재무 형편과 무관하게 절대적 금액 기준에 따라 소액자산 여부를 평가합니다.' },
  { id: 212, unit: '리스', text: '자산의 특성이 새 것일 때 일반적으로 소액이 아니라면, 해당 기초자산 리스는 소액자산 리스에 해당하지 않는다.', answer: 'O', explanation: '중고를 싸게 임차했더라도 \'새 제품\' 기준 시가가 비싼 축에 속한다면 소액자산 특례 적용이 불가능합니다.' },
  { id: 213, unit: '리스', text: '리스이용자가 자산을 전대리스하거나 전대리스할 것으로 예상하는 경우에 상위리스는 소액자산 리스에 해당하지 않는다.', answer: 'O', explanation: '빌린 자산을 다시 전대하여 마진을 취하는 구조에서는 소액자산 면제 특례를 배제합니다.' },
  { id: 214, unit: '리스', text: '실무적 간편법으로 리스이용자는 기초자산의 유형별로 비리스요소를 리스요소와 분리하지 않고 하나의 리스요소로 회계처리하는 방법을 선택할 수 있다.', answer: 'O', explanation: '유지관리용역비 등 비리스요소를 리스부채 몸집에 통합하여 함께 자산·부채화하는 간편법이 허용됩니다.' },
  { id: 215, unit: '리스', text: '판매형리스의 리스제공자는 기초자산의 공정가치와 리스제공자에게 귀속되는 리스료를 시장이자율로 할인한 현재가치 중 적은 금액으로 수익을 인식한다.', answer: 'O', explanation: '매출 과대 계상을 차단하기 위해 시가와 시장율 할인 현재가치 중 작은 금액(MIN)을 매출 수익으로 잡습니다.' },

  /* ── 법인세 ── */
  { id: 216, unit: '법인세', text: '이연법인세자산과 부채는 동일한 과세당국과 관련되어 있고 상계할 수 있는 법적 권리가 있는 경우 상계하여 표시한다.', answer: 'O', explanation: '세무서가 같고 법적 상계 권리가 완비되어 정산 가능한 구조 하에서만 반대 항목을 상계 표시합니다.' },
  { id: 217, unit: '법인세', text: '이연법인세자산·부채는 현재가치로 할인하여 표시하지 아니한다.', answer: 'O', explanation: '미래 실현 타이밍 추정이 가변적이고 불확실하므로 복잡성 해소를 위해 현재가치 할인을 전면 금지합니다.' },
  { id: 218, unit: '법인세', text: '자산과 부채를 유동과 비유동으로 구분하여 표시하는 경우, 이연법인세자산·부채는 비유동항목으로 구분하여 표시한다.', answer: 'O', explanation: '만기 도래 시점과 무관하게 이연법인세 항목은 재무상태표상 무조건 \'비유동\' 자산·부채로 고정 배치합니다.' },
  { id: 219, unit: '법인세', text: '차감할 일시적 차이에 대해 미래과세소득이 충분할 것으로 예상되는 경우 이연법인세자산을 인식할 수 있다.', answer: 'O', explanation: '미래에 이익이 나서 세금을 차감해 환급 효과를 볼 수 있는 방어 여력(과세소득)이 있어야 자산으로 인정됩니다.' },
  { id: 220, unit: '법인세', text: '모든 가산할 일시적 차이에 대하여 이연법인세부채를 인식하는 것을 원칙으로 한다.', answer: 'O', explanation: '미래에 세금을 더 내야 할 빚 요소는 자산과 달리 소득 실현성 검증 필터 없이 보수주의에 따라 무조건 부채로 올립니다.' },
  { id: 221, unit: '법인세', text: '이연법인세 자산과 부채는 보고기간말까지 제정되었거나 실질적으로 제정된 세율에 근거하여 당해 자산이 실현되거나 부채가 결제될 회계기간에 적용될 것으로 기대되는 세율을 사용하여 측정한다.', answer: 'O', explanation: '현재 세율이 아니라 실제 세 효과가 귀속되어 결제될 미래 회계기간의 \'예상 기대세율\'을 적용해 측정합니다.' },

  /* ── 회계변경 및 오류수정 ── */
  { id: 222, unit: '회계변경', text: '회계정책이란 기업이 재무제표를 작성·표시하기 위하여 적용하는 구체적인 원칙, 근거, 관습, 규칙 및 관행을 말한다.', answer: 'O', explanation: '장부를 짜는 대전제 시스템이자 근간 포맷을 서술 정의하는 상위 개념입니다.' },
  { id: 223, unit: '회계변경', text: '측정기준의 변경은 회계정책의 변경에 해당한다.', answer: 'O', explanation: '원가모형에서 공정가치모형으로 가거나 단가 산식을 FIFO에서 평균법으로 바꾸는 틀의 교체는 정책의 변경입니다.' },
  { id: 224, unit: '회계변경', text: '거래, 기타 사건 또는 상황에 대하여 구체적으로 적용할 수 있는 한국채택국제회계기준이 없는 경우, 경영진은 판단에 따라 회계정책을 개발 및 적용하여 회계정보를 작성할 수 있다.', answer: 'O', explanation: '기준의 공백 시 처리를 멈추는 게 아니라 가장 유용하고 신뢰성 높은 방향으로 자체 정책을 개발 가동해야 합니다.' },
  { id: 225, unit: '회계변경', text: '회계정책의 적용효과가 중요하지 않은 경우에는 그 회계정책을 적용하지 않을 수 있다.', answer: 'O', explanation: '중요성 원칙에 의거해 수치가 극소하여 대세에 영향이 없다면 규정 절차의 엄격 적용 의무에서 벗어납니다.' },
  { id: 226, unit: '회계변경', text: '기업의 재무상태, 재무성과 또는 현금흐름을 특정한 의도대로 표시하기 위하여 한국채택국제회계기준에 위배된 회계정책을 적용하는 것은 그것이 중요하지 않더라도 적절하다고 할 수 없다.', answer: 'O', explanation: '왜곡 의도가 섞인 위배는 소수점 금액 단위 오차 위배여도 중요성 면죄부 혜택을 받지 못해 전면 부적절 판정을 받습니다.' },
  { id: 227, unit: '회계변경', text: '한국채택국제회계기준에서 회계정책의 변경을 요구하거나, 회계정책의 변경을 반영한 재무제표가 거래, 기타 사건 또는 상황이 재무상태, 재무성과 또는 현금흐름에 미치는 영향에 대하여 신뢰성 있고 더 목적적합한 정보를 제공하는 경우 회계정책을 변경할 수 있다.', answer: 'O', explanation: '법적 요구가 있거나 자발적 변경 시 고품질 정보 제공이 증명될 때에만 변경 문호가 열립니다.' },
  { id: 228, unit: '회계변경', text: '과거에 발생한 거래와 실질이 다른 거래, 기타 사건 또는 상황에 대하여 다른 회계정책을 적용하는 경우는 회계정책의 변경에 해당하지 않는다.', answer: 'O', explanation: '본질적 경제 속성이 완전히 다른 새로운 거래에 새 룰을 적용하는 것은 소급 대상인 정책의 변경이 아닙니다.' },
  { id: 229, unit: '회계변경', text: '과거에 발생하지 않았거나 발생하였어도 중요하지 않았던 거래, 기타 사건 또는 상황에 대하여 새로운 회계정책을 적용하는 경우는 회계정책의 변경에 해당하지 않는다.', answer: 'O', explanation: '중요치 않아 대충 처리하던 거래가 비즈니스 확장으로 급증해 첫 정식 룰을 제정해 적용하는 것은 정책의 변경이 아닙니다.' },
  { id: 230, unit: '회계변경', text: '당기 기초시점에 과거기간 전체에 대한 새로운 회계정책 적용의 누적효과를 실무적으로 결정할 수 없는 경우, 실무적으로 적용할 수 있는 가장 이른 날부터 새로운 회계정책을 전진적용하여 비교정보를 재작성한다.', answer: 'O', explanation: '소급 역추적이 실무적으로 불가능하다면 과거 수정을 단념하고 가능한 이른 기점부터 향후 \'전진 적용\'합니다.' },
  { id: 231, unit: '회계변경', text: '유형자산 또는 무형자산에 재평가모형을 적용하기 시작하는 경우 소급법을 적용하지 아니한다.', answer: 'O', explanation: '측정기준 변경이 맞으나 전기 장부를 다 뜯어고치려면 과도한 비용이 들므로 기준서에서 특례 예외로서 \'전진 적용\'을 합법 승인해 줍니다.' },
  { id: 232, unit: '회계변경', text: '합리적 추정을 사용하는 것은 재무제표 작성의 필수적인 과정이며 재무제표의 신뢰성을 손상시키지 않는다.', answer: 'O', explanation: '대손율이나 잔존가치 예측치 등 추정치 개입은 재무보고의 필수 요소이며 정보 신뢰성을 절대 훼손하지 않습니다.' },
  { id: 233, unit: '회계변경', text: '회계정책의 변경과 회계추정의 변경을 구분하는 것이 어려운 경우에는 이를 회계추정의 변경으로 본다.', answer: 'O', explanation: '판단이 애매할 땐 과거 장부를 건드리지 않아 실무적 격차 혼란이 적은 \'회계추정의 변경\'으로 낙점 처리합니다.' },
  { id: 234, unit: '회계변경', text: '회계추정의 변경효과는 전진법을 적용하여 회계처리한다.', answer: 'O', explanation: '상각 방법 및 연수 단축 등 추정의 수정은 미래 지향적 성격이므로 과거 소급 처리를 절대 금지하고 향후로만 효과를 반영하는 \'전진법\' 무대입니다.' },

  /* ── 현금흐름표 ── */
  { id: 241, unit: '현금흐름표', text: '현금흐름표를 제외한 재무제표는 발생기준을 적용하여 작성한다.', answer: 'O', explanation: '현금흐름표를 제외한 4대 재무제표(재무상태표, 포괄손익서, 자본변동표 등)는 전액 발생기준 회계를 적용하며, 오직 현금흐름표만 현금주의입니다.' },
  { id: 242, unit: '현금흐름표', text: '간접법보다 직접법을 적용하는 것이 미래현금흐름을 추정하는 데 보다 유용한 정보를 제공하므로 영업활동 현금흐름을 보고하는 경우에는 직접법을 사용할 것을 권장한다.', answer: 'O', explanation: 'K-IFRS 기준서 규정상 영업활동 현금흐름 표시 시 총 유입·유출 총액 내역을 직접 보여주는 \'직접법\' 적용을 공식 권장(Encourage)하고 있습니다.' },
  { id: 243, unit: '현금흐름표', text: '비현금거래는 현금흐름표에서 제외하며 주석으로 해당 내용을 공시한다.', answer: 'O', explanation: '현찰 입출금이 수반되지 않은 유형자산 교환, 출자전환 등의 거래는 현금흐름표 본문 줄에 표기하지 못하며 오직 주석실에 공시해야 합니다.' },
  { id: 244, unit: '현금흐름표', text: '단기매매목적의 금융자산을 제외한 금융자산의 취득과 처분은 투자활동현금흐름으로 분류한다.', answer: 'O', explanation: '단기매매(트레이딩) 목적 금융자산 증감은 영업 자금 흐름이므로 영업활동이나, 이를 제외한 투자 주식·채권의 처분 취득은 \'투자활동\'에 배치 속합니다.' },
  { id: 245, unit: '현금흐름표', text: '리스이용자의 리스료 지급액 중 리스부채 상환에 해당하는 부분은 재무활동으로, 이자에 해당하는 부분은 영업활동 또는 재무활동으로 분류한다.', answer: 'O', explanation: '리스 원금 상각(부채 상환) 파트는 순수 조달 부채 환급이므로 재무활동이며, 리스이자 비용 부분은 영업 또는 재무 선택 처리가 허용됩니다.' },
  { id: 246, unit: '현금흐름표', text: '법인세로 인한 현금흐름은 재무활동과 투자활동에 명백히 관련되지 않는 한 영업활동 현금흐름으로 분류한다. 단, 실무적으로 법인세 현금흐름을 구분하기 어려운 경우 전체 현금흐름을 영업활동 현금흐름으로 분류할 수 있다.', answer: 'O', explanation: '세금 유출은 원칙적으로 특정 활동에 직접 일대일 매칭 안 되면 디폴트로 \'영업활동\'에 귀속시키며 쪼개기 곤란 시 영업활동 일괄 표기가 합법입니다.' },
  { id: 247, unit: '현금흐름표', text: '배당금의 지급은 일반적으로 재무활동으로 분류하며, 대체적인 방법으로 영업활동으로 분류할 수 있다.', answer: 'O', explanation: '주주에게 쏜 배당 유출금은 자본 조달 대가이므로 기본 \'재무활동\' 방에 정렬하나, 영업 성과 분배 관점으로 보아 영업활동방 선택도 열어둡니다.' },
  { id: 248, unit: '현금흐름표', text: '주식의 취득이나 상환에 따른 소유주에 대한 현금유출은 재무활동 현금흐름이다.', answer: 'O', explanation: '투자용 타사 주식이 아니라 \'자기 소유주(주주)\' 자본 환급 거래(자기주식 매입 소각 등)로 유출된 돈이므로 명백한 \'재무활동\' 금융 흐름에 도달합니다.' }
];

/* ══════════════════════════════════════════
상태 관리
══════════════════════════════════════════ */
const STORAGE_KEY = 'accounting_ox_v2';

function loadState() {
try {
return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
} catch { return {}; }
}
function saveState(s) {
localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

// state 구조:
// { [qid]: { correct: bool, attempts: number } }
let state = loadState();

// 오답 목록: 한 번이라도 틀린 문제 중 아직 '완전학습' 안 된 것
// 완전학습 기준: 최근 시도가 correct === true
function getWrongIds() {
return Object.keys(state)
.filter(id => state[id].correct === false)
.map(Number);
}

function getTotalAttempted() {
return Object.keys(state).length;
}
function getTotalCorrect() {
return Object.values(state).filter(v => v.correct === true).length;
}

function updateStats() {
const attempted = getTotalAttempted();
const correct = getTotalCorrect();
const wrongIds = getWrongIds();
const rate = attempted > 0 ? Math.round(correct / attempted * 100) : 0;

document.getElementById('stat-total').textContent = attempted;
document.getElementById('stat-correct').textContent = correct;
document.getElementById('stat-wrong-cnt').textContent = wrongIds.length;
document.getElementById('stat-rate').textContent = rate + '%';

const badge = document.getElementById('wrong-badge');
if (wrongIds.length > 0) {
badge.textContent = wrongIds.length;
badge.classList.remove('hidden');
} else {
badge.classList.add('hidden');
}

renderUnitGrid();
}

/* ══════════════════════════════════════════
단원 목록
══════════════════════════════════════════ */
const UNITS = [...new Set(QUESTIONS.map(q => q.unit))];

function renderUnitGrid() {
const grid = document.getElementById('unit-grid');
grid.innerHTML = UNITS.map(unit => {
const qs = QUESTIONS.filter(q => q.unit === unit);
const wrongN = qs.filter(q => state[q.id] && state[q.id].correct === false).length;
return `
<button class="unit-btn" onclick="startUnit('${unit}')">
${unit}
<span class="unit-count">${qs.length}문제</span>
<span class="unit-wrong ${wrongN > 0 ? 'show' : ''}">오답 ${wrongN}</span>
</button>`;
}).join('');
}

/* ══════════════════════════════════════════
탭 전환
══════════════════════════════════════════ */
function switchTab(tab) {
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
['view-home','view-quiz','view-wrong'].forEach(id => {
document.getElementById(id).style.display = 'none';
});

if (tab === 'home') {
document.querySelectorAll('.tab-btn')[0].classList.add('active');
document.getElementById('view-home').style.display = 'block';
} else if (tab === 'wrong') {
document.querySelectorAll('.tab-btn')[1].classList.add('active');
startWrongMode();
}
}

/* ══════════════════════════════════════════
퀴즈 엔진
══════════════════════════════════════════ */
let currentQueue = [];
let currentIndex = 0;
let currentMode = 'unit'; // 'unit' | 'wrong'
let currentUnit = '';
let answered = false;

function startUnit(unit) {
currentUnit = unit;
currentMode = 'unit';
currentQueue = QUESTIONS.filter(q => q.unit === unit);
currentIndex = 0;
answered = false;
showQuizView();
renderQuestion();
}

function startWrongMode() {
const wrongIds = getWrongIds();
if (wrongIds.length === 0) {
document.getElementById('view-wrong').style.display = 'block';
document.getElementById('view-wrong').innerHTML = `
<div class="done-card" style="margin-top:24px">
<div class="done-icon">🎉</div>
<h2>오답 문제가 없습니다!</h2>
<p>아직 풀지 않았거나 모든 문제를 맞혔어요.<br>단원별 연습을 먼저 진행해보세요.</p>
<div class="done-actions">
<button class="done-btn secondary" onclick="switchTab('home')">단원 선택으로</button>
</div>
</div>`;
return;
}
// 오답 문제를 무작위 섞기
currentQueue = shuffle(wrongIds.map(id => QUESTIONS.find(q => q.id === id)));
currentIndex = 0;
currentMode = 'wrong';
answered = false;
showWrongView();
renderQuestion();
}

function showQuizView() {
document.getElementById('view-home').style.display = 'none';
document.getElementById('view-wrong').style.display = 'none';
document.getElementById('view-quiz').style.display = 'block';
}
function showWrongView() {
document.getElementById('view-home').style.display = 'none';
document.getElementById('view-quiz').style.display = 'none';
document.getElementById('view-wrong').style.display = 'block';
}

function renderQuestion() {
const container = currentMode === 'unit'
? document.getElementById('view-quiz')
: document.getElementById('view-wrong');

if (currentIndex >= currentQueue.length) {
renderDone(container);
return;
}

const q = currentQueue[currentIndex];
const prog = `${currentIndex + 1} / ${currentQueue.length}`;
const pct = ((currentIndex) / currentQueue.length * 100).toFixed(0);
const modeLabel = currentMode === 'wrong'
? `<div class="wrong-mode-label">❌ 오답 반복 모드</div>` : '';
const wrongInfo = currentMode === 'wrong'
? `<div class="wrong-header-info">${modeLabel}틀린 문제만 모아서 반복합니다. 맞히면 목록에서 제거됩니다.</div>` : '';

container.innerHTML = `
<div class="quiz-header">
<button class="back-btn" onclick="switchTab('home')">← 목록</button>
<span class="quiz-title">${currentMode === 'wrong' ? '오답 반복' : currentUnit}</span>
<span class="quiz-progress">${prog}</span>
</div>
<div class="progress-bar-wrap">
<div class="progress-bar-fill" style="width:${pct}%"></div>
</div>
${wrongInfo}
<div class="question-card" id="q-card">
<div class="q-num">Q ${q.id}</div>
<div class="q-unit-tag">${q.unit}</div>
<div class="q-text">${q.text}</div>
</div>
<div class="ox-buttons">
<button class="ox-btn O" id="btn-O" onclick="submitAnswer('O')">O</button>
<button class="ox-btn X" id="btn-X" onclick="submitAnswer('X')">X</button>
</div>
<div class="feedback-box" id="feedback"></div>
<button class="next-btn" id="next-btn" onclick="nextQuestion()">
${currentIndex + 1 < currentQueue.length ? '다음 문제 →' : '결과 보기'}
</button>
`;
answered = false;
}

function submitAnswer(choice) {
if (answered) return;
answered = true;

const q = currentQueue[currentIndex];
const correct = (choice === q.answer);

// 상태 업데이트
state[q.id] = { correct, attempts: (state[q.id]?.attempts || 0) + 1 };
saveState(state);
updateStats();

// 버튼 스타일
const btnO = document.getElementById('btn-O');
const btnX = document.getElementById('btn-X');
[btnO, btnX].forEach(b => b.style.pointerEvents = 'none');

if (correct) {
document.getElementById('btn-' + choice).classList.add('selected-correct');
} else {
document.getElementById('btn-' + choice).classList.add('selected-wrong');
// 정답 강조
document.getElementById('btn-' + q.answer).classList.add('selected-correct');
}

// 피드백
const fb = document.getElementById('feedback');
fb.className = 'feedback-box ' + (correct ? 'correct' : 'wrong');
fb.innerHTML = correct
? `✅ <strong>정답!</strong> ${q.explanation}`
: `❌ <strong>오답!</strong> 정답은 <strong>${q.answer}</strong>입니다.<br>${q.explanation}`;
fb.style.display = 'block';

document.getElementById('next-btn').style.display = 'block';

// 오답 모드: 틀리면 queue 끝에 다시 추가
if (currentMode === 'wrong' && !correct) {
currentQueue.push(q);
}
}

function nextQuestion() {
currentIndex++;
renderQuestion();
}

function renderDone(container) {
const isWrong = currentMode === 'wrong';
const wrongLeft = getWrongIds().length;
const icon = isWrong ? (wrongLeft === 0 ? '🏆' : '🔄') : '✅';
const title = isWrong
? (wrongLeft === 0 ? '오답 완전 정복!' : '1회차 완료!')
: `${currentUnit} 단원 완료!`;
const desc = isWrong
? (wrongLeft === 0
? '모든 오답 문제를 맞혔습니다! 훌륭해요.'
: `아직 오답 ${wrongLeft}개가 남아있어요. 다시 반복할까요?`)
: '이 단원의 모든 문제를 풀었습니다.';

container.innerHTML = `
<div class="done-card" style="margin-top:24px">
<div class="done-icon">${icon}</div>
<h2>${title}</h2>
<p>${desc}</p>
<div class="done-actions">
${isWrong && wrongLeft > 0
? `<button class="done-btn primary" onclick="startWrongMode()">오답 다시 풀기</button>`
: ''}
${!isWrong
? `<button class="done-btn primary" onclick="startUnit('${currentUnit}')">다시 풀기</button>`
: ''}
<button class="done-btn secondary" onclick="switchTab('home')">단원 선택으로</button>
${wrongLeft > 0 && !isWrong
? `<button class="done-btn secondary" onclick="switchTab('wrong')">오답 반복 모드</button>`
: ''}
</div>
</div>`;
}

/* ══════════════════════════════════════════
유틸
══════════════════════════════════════════ */
function shuffle(arr) {
const a = [...arr];
for (let i = a.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[a[i], a[j]] = [a[j], a[i]];
}
return a;
}

function confirmReset() {
if (confirm('모든 학습 기록을 초기화하시겠습니까?')) {
localStorage.removeItem(STORAGE_KEY);
state = {};
updateStats();
switchTab('home');
alert('초기화 완료!');
}
}

/* ══════════════════════════════════════════
초기화
══════════════════════════════════════════ */
renderUnitGrid();
updateStats();
</script>
